<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works | Moood Studio</title>
    <meta name="description" content="Selected works and high-performance manufacturing by Moood Studio.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body class="works-page">
    <!-- [AGENCY CORE: c-hero] CLONE: JOSHUA (MODIFIED TOP) -->
    <section class="c-hero c-hero--viewport c-hero--m-joshua" id="heroSection">

        <!-- Slot: Visual Background -->
        <div class="c-hero__visual">
            <div class="c-visual-placeholder"></div>
        </div>

        <!-- content-to-fade: All elements here will fade out when drawer opens -->
        <div class="c-hero__container content-to-fade">
            <div class="c-hero__content">
                <!-- Slot: Logo Center -->
                <div class="c-hero__logo">
                    <img src="assets/images/moood-logo.svg" alt="Moood Studio Agency">
                </div>
                <h1 class="c-hero__title">The look back</h1>
                <p class="c-hero__desc">A small selection of works we've done in the past.</p>
            </div>
        </div>

        <!-- 🎡 [NEW] COMPONENT: c-carousel (Infinite Inertia) -->
        <div class="c-carousel" id="worksCarousel">
            <div class="c-carousel__track" id="carouselTrack">
                <!-- 16 initial cards -->
                <div class="c-card-work" data-id="1">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 01</div>
                </div>
                <div class="c-card-work" data-id="2">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 02</div>
                </div>
                <div class="c-card-work" data-id="3">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 03</div>
                </div>
                <div class="c-card-work" data-id="4">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 04</div>
                </div>
                <div class="c-card-work" data-id="5">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 05</div>
                </div>
                <div class="c-card-work" data-id="6">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 06</div>
                </div>
                <div class="c-card-work" data-id="7">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 07</div>
                </div>
                <div class="c-card-work" data-id="8">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 08</div>
                </div>
                <div class="c-card-work" data-id="9">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 09</div>
                </div>
                <div class="c-card-work" data-id="10">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 10</div>
                </div>
                <div class="c-card-work" data-id="11">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 11</div>
                </div>
                <div class="c-card-work" data-id="12">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 12</div>
                </div>
                <div class="c-card-work" data-id="13">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 13</div>
                </div>
                <div class="c-card-work" data-id="14">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 14</div>
                </div>
                <div class="c-card-work" data-id="15">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 15</div>
                </div>
                <div class="c-card-work" data-id="16">
                    <div class="c-card-work__visual"></div>
                    <div class="c-card-work__label">Project 16</div>
                </div>
            </div>
        </div>

        <!-- 📏 [NEW] COMPONENT: c-dial (Ruler Indicator) -->
        <div class="c-dial" id="worksDial">
            <div class="c-dial__track" id="dialTrack">
                <!-- Lines will be dynamically generated via JS or repeated -->
            </div>
            <div class="c-dial__indicator"></div>
        </div>

    </section>

    <!-- 🖼️ [NEW] COMPONENT: c-drawer (Action Panel) -->
    <div class="c-drawer" id="workDrawer">
        <button class="c-drawer__close" onclick="closeWorkDrawer()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <div class="c-drawer__container">
            <div class="c-drawer__visual" id="drawerVisual">
                <h2 class="c-drawer__title" id="drawerTitle">Project Title</h2>
                <div class="c-drawer__divider"></div>
                <img src="" alt="" id="drawerImage">
            </div>
        </div>
    </div>

    <!-- Page Specific Script -->
    <script src="works.js"></script>
</body>

</html>
