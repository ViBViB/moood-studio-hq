function getInitials(name) { return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }
function timeAgo(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

    const name = nameEl.value.trim();
    const comment = commentEl.value.trim();
    if (!name || !comment) { showStatus('Please fill into both fields.', true); return; }
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
        await db.collection('narratives').doc(NARRATIVE_ID).collection('sections').doc(sectionId).collection('comments').add({
            name, comment, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        commentEl.value = ''; btn.textContent = 'Send'; btn.disabled = false;
        showStatus('Feedback sent ✓'); loadComments(sectionId);
    } catch (e) { btn.textContent = 'Send'; btn.disabled = false; showStatus('Firebase Error.', true); }
}

async function loadComments(sectionId) {
    const container = document.getElementById('comments-' + sectionId);
    try {
        const snap = await db.collection('narratives').doc(NARRATIVE_ID).collection('sections').doc(sectionId).collection('comments').orderBy('timestamp', 'asc').get();
        if (snap.empty) { container.innerHTML = '<p class="nv-feedback-empty">No feedback yet.</p>'; return; }
        container.innerHTML = snap.docs.map(doc => {
            const d = doc.data();
            return `
                <div class="nv-comment">
                    <div class="nv-comment__avatar">${getInitials(d.name)}</div>
                    <div class="nv-comment__body">
                        <div class="nv-comment__header"><span class="nv-comment__name">${d.name}</span><span class="nv-comment__time">${timeAgo(d.timestamp)}</span></div>
                        <p class="nv-comment__text">${d.comment}</p>
                    </div>
                </div>`;
        }).join('');
    } catch (e) { container.innerHTML = '<p class="nv-feedback-empty">Firestore not configured.</p>'; }
}

function renderSectionLabel(section, index) {
    return `<div class="nv-section-label"><span class="nv-section-label__number">${String(index + 1).padStart(2, '0')}</span><div class="nv-section-label__divider"></div><span class="nv-section-label__name">${section.label || 'Section'}</span></div>`;
}

function renderHero(section, index) {
    const c = section.content;
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}${c.eyebrow ? `<p class="nv-eyebrow">${c.eyebrow}</p>` : ''}<h1 class="nv-hero__h1">${c.h1}</h1>${c.description ? `<p class="nv-hero__description">${c.description}</p>` : ''}${c.cta ? `<a href="${c.cta.url || '#'}" class="nv-btn nv-btn--primary" style="margin-top:2rem;display:inline-flex">${c.cta.label}</a>` : ''}${renderFeedbackBlock(section.id)}</div></section>`;
}

function renderSection(section, index) {
    const c = section.content;
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}${c.eyebrow ? `<p class="nv-eyebrow">${c.eyebrow}</p>` : ''}<h2 class="nv-section__h2">${c.h2}</h2>${c.p ? `<p class="nv-section__p">${c.p}</p>` : ''}${c.cta ? `<a href="${c.cta.url || '#'}" class="nv-cta-link">${c.cta.label} →</a>` : ''}${renderFeedbackBlock(section.id)}</div></section>`;
}

function renderFeatureList(section, index) {
    const c = section.content;
    const itemsHtml = (c.items || []).map(item => `<div class="nv-feature-item"><div class="nv-feature-item__title">${item.title}</div><div class="nv-feature-item__description">${item.description}</div></div>`).join('');
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}${c.eyebrow ? `<p class="nv-eyebrow">${c.eyebrow}</p>` : ''}<h2 class="nv-section__h2">${c.h2}</h2>${c.p ? `<p class="nv-section__p">${c.p}</p>` : ''}<div class="nv-feature-grid">${itemsHtml}</div>${c.cta ? `<a href="${c.cta.url || '#'}" class="nv-btn nv-btn--primary" style="margin-top:2.5rem;display:inline-flex">${c.cta.label}</a>` : ''}${renderFeedbackBlock(section.id)}</div></section>`;
}

function renderTable(section, index) {
    const c = section.content;
    const headersHtml = (c.headers || []).map((h, i) => `<th class="nv-table__th${i === 1 ? ' nv-table__th--highlight' : ''}">${h}</th>`).join('');
    const rowsHtml = (c.rows || []).map(row => `<tr>${row.map((cell, i) => `<td class="nv-table__td${i === 1 ? ' nv-table__td--highlight' : ''}">${cell}</td>`).join('')}</tr>`).join('');
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}${c.eyebrow ? `<p class="nv-eyebrow">${c.eyebrow}</p>` : ''}<h2 class="nv-section__h2">${c.h2}</h2><div class="nv-table-wrap"><table class="nv-table"><thead><tr>${headersHtml}</tr></thead><tbody>${rowsHtml}</tbody></table></div>${renderFeedbackBlock(section.id)}</div></section>`;
}

function renderQuote(section, index) {
    const c = section.content;
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}<div class="nv-quote"><span class="nv-quote__mark">"</span><p class="nv-quote__text">${c.quote}</p>${c.attribution ? `<p class="nv-quote__attribution">— ${c.attribution}</p>` : ''}</div>${renderFeedbackBlock(section.id)}</div></section>`;
}

function renderCtaBlock(section, index) {
    const c = section.content;
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}<div class="nv-cta-block">${c.eyebrow ? `<p class="nv-eyebrow">${c.eyebrow}</p>` : ''}<h2 class="nv-cta-block__h2">${c.h2}</h2>${c.description ? `<p class="nv-cta-block__description">${c.description}</p>` : ''}${c.cta ? `<a href="${c.cta.url || '#'}" class="nv-btn nv-btn--primary">${c.cta.label}</a>` : ''}${c.footnote ? `<p class="nv-cta-block__footnote">${c.footnote}</p>` : ''}</div>${renderFeedbackBlock(section.id)}</div></section>`;
}

const RENDERERS = { 'hero': renderHero, 'section': renderSection, 'feature-list': renderFeatureList, 'quote': renderQuote, 'table': renderTable, 'cta-block': renderCtaBlock };

function renderNav(data) {
    const items = data.sections.map((s, i) => `<a class="nv-nav-item" href="#section-${s.id}" id="nav-${s.id}"><span class="nv-nav-item__number">${String(i+1).padStart(2, '0')}</span><span class="nv-nav-item__label">${s.label || 'Section'}</span></a>`).join('');
    return `<aside class="nv-sidebar"><div class="nv-sidebar__header">${MOOOD_LOGO}<div class="nv-sidebar__project">${data.meta.project}</div><div class="nv-sidebar__meta">Narrative Review</div></div><div class="nv-sidebar__sections-label">Sections</div><nav class="nv-sidebar__nav">${items}</nav><div class="nv-sidebar__footer"><span class="nv-status-badge pending">${data.meta.status || 'Pending'}</span></div></aside>`;
}

function renderMain(data) {
    const sectionsHtml = data.sections.map((section, i) => { const r = RENDERERS[section.type]; return r ? r(section, i) : ''; }).join('');
    return `<div class="nv-main"><div class="nv-topbar"><div class="nv-topbar__info"><span class="nv-topbar__client">${data.meta.project}</span><span class="nv-topbar__sep">·</span><span class="nv-topbar__segment">${data.meta.page}</span><span class="nv-topbar__sep">·</span><span class="nv-topbar__meta">${data.meta.version}</span></div><div class="nv-topbar__actions"><button class="nv-btn nv-btn--ghost" onclick="window.print()">Print / PDF</button></div></div>${sectionsHtml}</div>`;
}

function initScrollSpy(sections) {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const id = entry.target.id.replace('section-', '');
                document.querySelectorAll('.nv-nav-item').forEach(el => el.classList.remove('active'));
                const nav = document.getElementById('nav-' + id); if (nav) nav.classList.add('active');
            }
        });
    }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });
    sections.forEach(s => { const el = document.getElementById('section-' + s.id); if (el) observer.observe(el); });
}

(function init() {
    const data = NARRATIVE_DATA;
    document.title = `${data.meta.project} — Narrative Review`;
    document.getElementById('app').innerHTML = renderNav(data) + renderMain(data);
    initScrollSpy(data.sections);
})();
</script>
</body>
</html>
