    ]
};

// ── HELPERS ─────────────────────────────────────────
function getInitials(name) {
    return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}
function timeAgo(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function showStatus(msg, isError = false) {
    const el = document.getElementById('db-status');
    el.textContent = msg;
    el.className = 'nv-db-status visible' + (isError ? ' error' : '');
    setTimeout(() => el.className = 'nv-db-status', 2500);
}

// ── APPROVAL SYSTEM ──────────────────────────────────
async function approveNarrative() {
    const data = NARRATIVE_DATA;
    
    // Smooth transition to Thank You state
    document.getElementById('app').innerHTML = `
        <div style="height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; background: #fff; text-align: center; padding: 40px; animation: fadeIn 0.8s ease;">
            <div style="max-width: 640px;">
                <div style="margin-bottom: 48px;">
                    ${MOOOD_LOGO.replace('class="nv-sidebar__logo"', 'style="height:60px;width:auto;margin:0 auto;display:block"')}
                </div>
                <h1 style="font-size: clamp(32px, 5vw, 48px); font-weight: 600; letter-spacing: -0.04em; margin-bottom: 24px; color: #000;">Narrative Approved.</h1>
                <p style="font-size: 18px; line-height: 1.7; color: #555; margin-bottom: 48px; font-family: 'Inter', sans-serif;">
                    Thank you. The strategic narrative for <strong>${data.meta.project}</strong> has been locked.<br><br>
                    This document will now serve as the absolute structural blueprint to generate the <strong>Skeleton</strong> (Structural Wireframe) and the <strong>Mockup</strong> (High-Fidelity Visuals). We will notify you once these assets are ready for your review.
                </p>
                <div style="display: none;">
                    <a href="https://moood.studio">Return to Studio</a>
                    <button onclick="location.reload()">View Narrative Again</button>
                </div>
            </div>
        </div>
        <style>@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }</style>
    `;
    window.scrollTo(0,0);
    
    // Trigger automated notification (Email / Agency Webhook)
    try {
        await fetch('/api/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                clientName: data.meta.client || 'Client',
                projectName: data.meta.project || 'Project',
                segment: 'Narrative Review',
                status: 'Approved',
                narrativeId: NARRATIVE_ID,
                message: `URGENT: Narrative approved for ${data.meta.project}. Pipeline ready for Skeleton Construction.`
            })
        });
    } catch (err) {
        console.error("Notification trigger failed, but approval was logged in DB.");
    }

    // Optional: Log approval to Firestore
    try {
        await db.collection('narratives').doc(NARRATIVE_ID).set({
            approved: true,
            approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
            status: 'Approved'
        }, { merge: true });
    } catch(e) {}
}

// ── COMMENTING SYSTEM ────────────────────────────────
function renderFeedbackBlock(sectionId) {
    return `
        <button class="nv-feedback-toggle" onclick="toggleFeedback('${sectionId}')">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 1H2C1.45 1 1 1.45 1 2v9c0 .55.45 1 1 1h2v3l3-3h7c.55 0 1-.45 1-1V2c0-.55-.45-1-1-1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            </svg>
            Leave feedback
        </button>
        <div class="nv-feedback-panel" id="panel-${sectionId}">
            <div class="nv-feedback-form">
                <div class="nv-feedback-form-row" style="display:flex;gap:10px;margin-bottom:10px">
                    <input type="text" id="name-${sectionId}" placeholder="Your name" style="flex:1">
                    <button class="nv-feedback-submit" onclick="submitComment('${sectionId}')">Send</button>
                </div>
                <textarea id="comment-${sectionId}" placeholder="Your feedback on this section..."></textarea>
            </div>
            <div class="nv-comments-list" id="comments-${sectionId}"></div>
        </div>
    `;
}

function toggleFeedback(sectionId) {
    const panel = document.getElementById('panel-' + sectionId);
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
        loadComments(sectionId);
        document.getElementById('name-' + sectionId).focus();
    }
}

async function submitComment(sectionId) {
    const nameEl = document.getElementById('name-' + sectionId);
    const commentEl = document.getElementById('comment-' + sectionId);
    const name = nameEl.value.trim();
    const comment = commentEl.value.trim();
    if (!name || !comment) { showStatus('Please fill in both fields.', true); return; }
    try {
        await db.collection('narratives').doc(NARRATIVE_ID)
            .collection('sections').doc(sectionId)
            .collection('comments').add({
                name, comment,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        commentEl.value = '';
        showStatus('Feedback sent ✓');
        loadComments(sectionId);
    } catch (e) {
        showStatus('Error — Firestore error.', true);
    }
}

async function loadComments(sectionId) {
    const container = document.getElementById('comments-' + sectionId);
    try {
        const snap = await db.collection('narratives').doc(NARRATIVE_ID)
            .collection('sections').doc(sectionId)
            .collection('comments')
            .orderBy('timestamp', 'asc').get();
        if (snap.empty) {
            container.innerHTML = '<p style="padding:16px;font-size:12px;color:#aaa">No feedback yet.</p>';
            return;
        }
        container.innerHTML = snap.docs.map(doc => {
            const d = doc.data();
            return `<div class="nv-comment"><div class="nv-comment__avatar">${getInitials(d.name)}</div><div class="nv-comment__body"><span class="nv-comment__name">${d.name}</span><span class="nv-comment__time">${timeAgo(d.timestamp)}</span><p class="nv-comment__text">${d.comment}</p></div></div>`;
        }).join('');
    } catch (e) {
        container.innerHTML = '<p style="padding:16px;font-size:12px;color:#fcc">Error loading feedback.</p>';
    }
}

// ── RENDERERS ─────────────────────────────────────────
function renderSectionLabel(section, index) {
    return `<div class="nv-section-label"><span class="nv-section-label__number">${String(index + 1).padStart(2, '0')}</span><div class="nv-section-label__divider"></div><span class="nv-section-label__name">${section.label || 'Section'}</span></div>`;
}

function renderHero(section, index) {
    const c = section.content;
    const desc = c.description || c.p || '';
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}${c.eyebrow ? `<p class="nv-eyebrow">${c.eyebrow}</p>` : ''}<h1 class="nv-hero__h1">${c.h1}</h1>${desc ? `<p class="nv-hero__description">${desc}</p>` : ''}${c.cta ? `<div style="margin-top:40px"><a href="${c.ctaHref || '#'}" class="nv-cta-link">${c.cta} →</a></div>` : ''}${renderFeedbackBlock(section.id)}</div></section>`;
}

function renderSection(section, index) {
    const c = section.content;
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}${c.eyebrow ? `<p class="nv-eyebrow">${c.eyebrow}</p>` : ''}<h2 class="nv-section__h2">${c.h2}</h2>${c.p ? `<p class="nv-section__p">${c.p}</p>` : ''}${c.cta ? `<a href="${c.ctaHref || '#'}" class="nv-cta-link">${c.cta} →</a>` : ''}${renderFeedbackBlock(section.id)}</div></section>`;
}

function renderFeatureList(section, index) {
    const c = section.content;
    const items = (c.items || []).map(item => `<div class="nv-feature-item"><div class="nv-feature-item__title">${item.title}</div><div class="nv-feature-item__description">${item.description}</div></div>`).join('');
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}<h2 class="nv-section__h2">${c.h2}</h2>${c.p ? `<p class="nv-section__p">${c.p}</p>` : ''}<div class="nv-feature-grid">${items}</div>${renderFeedbackBlock(section.id)}</div></section>`;
}

function renderTable(section, index) {
    const c = section.content;
    const headers = (c.headers || []).map((h, i) => `<th class="nv-table__th${i === 1 ? ' nv-table__th--highlight' : ''}">${h}</th>`).join('');
    const rows = (c.rows || []).map(row => `<tr>${row.map((cell, i) => `<td class="nv-table__td${i === 1 ? ' nv-table__td--highlight' : ''}">${cell}</td>`).join('')}</tr>`).join('');
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}<h2 class="nv-section__h2">${c.h2}</h2><div class="nv-table-wrap"><table class="nv-table"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div>${renderFeedbackBlock(section.id)}</div></section>`;
}

function renderQuote(section, index) {
    const c = section.content;
    return `<section class="nv-section" id="section-${section.id}"><div class="nv-section__inner">${renderSectionLabel(section, index)}<div class="nv-quote"><span class="nv-quote__mark">"</span><p class="nv-quote__text">${c.quote}</p><p class="nv-quote__attribution">— ${c.attribution}</p></div>${renderFeedbackBlock(section.id)}</div></section>`;
}

const RENDERERS = { 'hero': renderHero, 'section': renderSection, 'feature-list': renderFeatureList, 'quote': renderQuote, 'table': renderTable };

function renderNav(data) {
    const items = data.sections.map((s, i) => `<a class="nv-nav-item" href="#section-${s.id}" id="nav-${s.id}"><span class="nv-nav-item__number">${String(i+1).padStart(2, '0')}</span><span class="nv-nav-item__label">${s.label}</span></a>`).join("");
    return `<aside class="nv-sidebar"><div class="nv-sidebar__header">${MOOOD_LOGO}</div><div class="nv-sidebar__sections-label">Sections</div><nav class="nv-sidebar__nav">${items}</nav><div class="nv-sidebar__footer"><span class="nv-status-badge pending">${data.meta.status}</span></div></aside>`;
}

function renderMain(data) {
    const sections = data.sections.map((section, i) => {
        const renderer = RENDERERS[section.type];
        return renderer ? renderer(section, i) : `<section class="nv-section"><p>Unknown type: ${section.type}</p></section>`;
    }).join("");
    
    return `
        <div class="nv-main">
            <div class="nv-topbar">
                <div class="nv-topbar__info">
                    <span class="nv-topbar__client">${data.meta.project}</span>
                    <span class="nv-topbar__sep">·</span>
                    <span class="nv-topbar__segment">Narrative</span>
                    <span class="nv-topbar__sep">·</span>
                    <span class="nv-topbar__segment">${data.meta.page || 'Homepage'}</span>
                    <span class="nv-topbar__sep">·</span>
                    <span class="nv-topbar__meta">${data.meta.date || ''}</span>
                    <span class="nv-topbar__sep">·</span>
                    <span class="nv-topbar__meta">${data.meta.version || ''}</span>
                </div>
                <div class="nv-topbar__actions">
                    <button class="nv-btn nv-btn--ghost" onclick="window.print()">Print / PDF</button>
                    <button class="nv-btn nv-btn--primary" onclick="approveNarrative()">Approve Narrative</button>
                </div>
            </div>
            ${sections}
        </div>`;
}

function initScrollSpy(sections) {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const id = entry.target.id.replace('section-', '');
                document.querySelectorAll('.nv-nav-item').forEach(el => el.classList.remove('active'));
                const nav = document.getElementById('nav-' + id);
                if (nav) nav.classList.add('active');
            }
        });
    }, { rootMargin: '-20% 0px -70% 0px' });
    sections.forEach(s => {
        const el = document.getElementById('section-' + s.id);
        if (el) observer.observe(el);
    });
}

// ── INIT ─────────────────────────────────────────────
(function init() {
    const data = NARRATIVE_DATA;
    document.getElementById('app').innerHTML = renderNav(data) + renderMain(data);
    initScrollSpy(data.sections);
})();
</script>
