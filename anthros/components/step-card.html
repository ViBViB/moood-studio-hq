<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — Step Card</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />

    <style>
        /* ── Reset ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            font-family: var(--brand-font-primary);
            padding: 40px;
        }

        /* ══════════════════════════════════════════
           STEP CARD
           Figma node: 12830:6650
           Container: p-30px, rounded-12px, border-1px
        ══════════════════════════════════════════ */
        .step-card {
            background: #F2F1EF;
            /* Based on visual match and general secondary bg */
            border: 1px solid #b9b9b9;
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 400px;
            /* Example width for preview */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .step-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .step-icon {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .step-title-group {
            display: flex;
            align-items: baseline;
            gap: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1.2px;
            margin: 15px 0 0;
        }

        .step-number {
            font-size: 35px;
            color: #bdbcbc;
            line-height: 0.99;
        }

        .step-text {
            font-size: 30px;
            color: #000000;
            line-height: 0.99;
        }

        .step-body {
            font-size: var(--brand-body-l-size);
            line-height: 1.5;
            letter-spacing: 0.18px;
            color: #2a2a2a;
        }

        .step-body strong {
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="step-card" data-node-id="12830:6650">
        <!-- Icon — Figma node 12830:6651 -->
        <img class="step-icon" src="../assets/images/icon-step-1.svg" alt="" aria-hidden="true"
            data-node-id="12830:6651" />

        <!-- Title Group — Figma node 12830:6654 -->
        <div class="step-title-group" data-node-id="12830:6654">
            <span class="step-number" data-node-id="12830:6655">1</span>
            <span class="step-text">Unlock Tilt</span>
        </div>

        <!-- Body — Figma node 12830:6656 -->
        <p class="step-body" data-node-id="12830:6656">
            Turn the <strong>front-left control knob forward</strong> to unlock your tilt.
        </p>
    </div>

</body>

</html>
