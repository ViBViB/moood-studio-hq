<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — CTA Section</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />

    <style>
        /* ── Reset ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            font-family: var(--brand-font-primary);
        }

        /* ══════════════════════════════════════════
           SECTION: CTA (FIX YOUR SIT)
           Figma node: 12830:5183
           Background: Black (#000000)
        ══════════════════════════════════════════ */
        .cta-section {
            width: 100%;
            background-color: var(--brand-color-black);
            padding: 120px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .cta-inner {
            width: 100%;
            max-width: 1360px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
            text-align: center;
        }

        .cta-title {
            font-family: var(--brand-font-primary);
            font-weight: 900;
            font-size: var(--brand-h2-size);
            line-height: var(--brand-h2-leading);
            letter-spacing: var(--brand-h2-tracking);
            text-transform: uppercase;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cta-title--cyan {
            color: var(--brand-color-cyan);
        }

        .cta-title--white {
            color: var(--brand-color-white);
        }

        .cta-desc {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: var(--brand-body-std-size);
            line-height: var(--brand-body-std-leading);
            letter-spacing: var(--brand-body-std-tracking);
            color: #e7e7e7;
            max-width: 800px;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--brand-color-white);
            color: var(--brand-color-black);
            padding: 11px 46px;
            border-radius: 100px;
            text-decoration: none;
            font-family: var(--brand-font-primary);
            font-weight: 500;
            font-size: var(--brand-body-l-size);
            line-height: 1.5;
            letter-spacing: 0.2px;
            text-transform: uppercase;
            transition: transform 0.2s ease, background-color 0.2s ease;
            margin-top: 8px;
        }

        .cta-btn:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cta-section {
                padding: 80px 24px;
            }
        }
    </style>
</head>

<body>

    <section class="cta-section" id="fix-your-sit">
        <div class="cta-inner">
            <h2 class="cta-title">
                <span class="cta-title--cyan">Let Anthros</span>
                <span class="cta-title--white">Fix Your Sit®</span>
            </h2>
            <p class="cta-desc">
                Have Questions? Schedule a posture consult with one of our licensed OT/PT’s.
            </p>
            <a href="#" class="cta-btn">Shop Now</a>
        </div>
    </section>

</body>

</html>
