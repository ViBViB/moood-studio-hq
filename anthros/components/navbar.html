        /* ── COMPONENT: Navbar ──────────────────────────────────────
       Figma Node: 12830:5292

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #111;
            font-family: var(--brand-font-primary);
        }

        /* ── Root navbar ── */
        .anthros-navbar {
            width: 100%;
            background-color: var(--brand-color-black);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 40px;
            /* py-xxsmall=16px  px-medium=40px */
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        /* ── Inner layout: 3 columns ── */
        .navbar-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        /* ── LEFT: Logo ── */
        .navbar-logo {
            display: flex;
            align-items: center;
            padding: 9.29px 0;
            flex-shrink: 0;
            text-decoration: none;
        }

        .navbar-logo img {
            height: 49px;
            width: auto;
            display: block;
        }

        /* ── CENTER: Primary nav links ── */
        .navbar-links {
            display: flex;
            align-items: center;
            gap: 43px;
            list-style: none;
        }

        .navbar-links a {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            /* Segoe UI Regular, closest = Clarika Rg */
            font-size: var(--brand-nav-link-size);
            line-height: 1.6;
            /* 25.6px / 16px */
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--brand-color-white);
            text-decoration: none;
            white-space: nowrap;
            transition: opacity 0.2s ease;
        }

        .navbar-links a:hover {
            opacity: 0.6;
        }

        /* ── RIGHT: Utility row + action row ── */
        .navbar-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            flex-shrink: 0;
        }

        /* Top utility links row */
        .navbar-utils {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-utils-icon {
            width: 13px;
            height: 13px;
            display: block;
            flex-shrink: 0;
        }

        .navbar-utils-sep {
            width: 2px;
            height: 2px;
            background-color: var(--brand-color-white);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .navbar-utils a {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: var(--brand-nav-small-size);
            line-height: 1;
            letter-spacing: 1.92px;
            text-transform: uppercase;
            color: var(--brand-color-white);
            text-decoration: none;
            white-space: nowrap;
            transition: opacity 0.2s ease;
        }

        .navbar-utils a:hover {
            opacity: 0.6;
        }

        /* Bottom action row: SHOP NOW + icons */
        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* SHOP NOW pill button */
        .btn-shop-now {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 21px;
            border: 1px solid var(--brand-color-white);
            border-radius: var(--brand-radius-pill);
            font-family: var(--brand-font-primary);
            font-weight: 500;
            font-size: var(--brand-body-std-size);
            /* --typography/text-size/text-regular */
            line-height: 1.5;
            letter-spacing: 0;
            text-transform: uppercase;
            color: var(--brand-color-white);
            text-decoration: none;
            white-space: nowrap;
            transition: background-color 0.2s ease, color 0.2s ease;
            cursor: pointer;
        }

        .btn-shop-now:hover {
            background-color: var(--brand-color-white);
            color: var(--brand-color-black);
        }

        /* Icon buttons row */
        .navbar-icons {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .navbar-icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .navbar-icon-btn:hover {
            opacity: 0.6;
        }

        .navbar-icon-btn.user img {
            width: 25px;
            height: 25px;
        }

        .navbar-icon-btn.cart img {
            width: 27px;
            height: 27px;
        }

        /* ── Preview scaffold ── */
        .preview-spacer {
            height: 120px;
        }

        .preview-label {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-top: 20px;
            font-family: var(--brand-font-primary);
        }
    </style>
</head>
