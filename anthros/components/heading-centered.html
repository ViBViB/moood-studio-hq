<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — Heading Centered</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            font-family: var(--brand-font-primary);
            padding: 80px 40px;
        }

        /* ══════════════════════════════════════════
           HEADING CENTERED
           Centered tagline + H2 + body text on dark bg
           Figma node: 12830:4997–5001
           Reusable for any dark-bg section header
        ══════════════════════════════════════════ */
        .hcent-block {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: flex-start;
            width: 100%;
        }

        /* ── Tagline + H2 row ──
           Figma node: 12830:4998
           flex-col, gap-16px, items-center, text-white, uppercase */
        .hcent-headline-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            color: #ffffff;
            text-transform: uppercase;
            width: 100%;
        }

        /* Tagline ——
           Clarika Regular (400), 18px, lh: 1, tracking: 3.6px */
        .hcent-tagline {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: var(--brand-tagline-size);
            line-height: 1;
            letter-spacing: 3.6px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* H2 ——
           Clarika Black (900), 64px, lh: 1.1, tracking: -0.64px */
        .hcent-h2 {
            font-family: var(--brand-font-primary);
            font-weight: 900;
            font-size: var(--brand-h2-size);
            line-height: var(--brand-h2-leading);
            letter-spacing: var(--brand-h2-tracking);
            color: #ffffff;
            text-transform: uppercase;
            text-align: center;
        }

        /* Body text ——
           Clarika Regular (400), 18px, lh: 1.45, tracking: 0.18px, center, #e7e7e7 */
        .hcent-body {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: var(--brand-body-std-size);
            line-height: var(--brand-body-std-leading);
            color: #e7e7e7;
            text-align: center;
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- HEADING CENTERED — Figma nodes 12830:4997–5001 -->
    <!-- Reusable: tagline + H2 headline + body on dark background -->
    <div class="hcent-block" data-node-id="12830:4997" id="heading-centered">

        <!-- Tagline + H2 — node 12830:4998 -->
        <div class="hcent-headline-group" data-node-id="12830:4998">
            <div class="hcent-tagline" data-node-id="12830:4999">Modeled and Measured:</div>
            <h2 class="hcent-h2" data-node-id="12830:5000">Digital Human Simulation</h2>
        </div>

        <!-- Body — node 12830:5001 -->
        <p class="hcent-body" data-node-id="12830:5001">Using Simuserv's digital biomechanics tools, disc pressure was
            simulated across postures:</p>

    </div>

</body>

</html>
