<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — Table Media</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            font-family: var(--brand-font-primary);
            padding: 40px;
        }

        /* ══════════════════════════════════════════
           TABLE MEDIA
           Bordered card: data table left + image right
           Figma node: 12830:5002
           Same internal pattern as split-card-left
           Differences vs split-card-left:
             1. Outer border wrapper (1px #b8b8b8, r-4px, p-24px)
             2. Both columns flex:1 (50/50 split)
             3. 3 data rows vs 2
        ══════════════════════════════════════════ */

        /* ── Outer bordered card ──
           Figma: border 1px #b8b8b8 | radius 4px | p-24px | gap-40px */
        .tm-card {
            border: 1px solid #b8b8b8;
            border-radius: 4px;
            padding: 24px;
            display: flex;
            gap: 40px;
            align-items: center;
            width: 100%;
        }

        /* ── LEFT: Table + footer note ── flex:1 */
        .tm-left {
            flex: 1 0 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── Data table ──
           border-collapse: collapse — all cells 1.5px #d0d0d0 */
        .tm-table {
            width: 100%;
            border-collapse: collapse;
        }

        /* Header cells — glass bg + all borders */
        .tm-table th {
            font-family: var(--brand-font-primary);
            font-weight: 700;
            font-size: var(--brand-body-l-size);
            line-height: 1.5;
            text-align: center;
            text-transform: uppercase;
            color: #ffffff;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid #d0d0d0;
        }

        .tm-table th:first-child {
            border-radius: 4px 0 0 0;
        }

        .tm-table th:last-child {
            border-radius: 0 4px 0 0;
        }

        /* Body cells — transparent + all borders */
        .tm-table td {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: var(--brand-body-l-size);
            line-height: 1.45;
            letter-spacing: 0.18px;
            text-align: center;
            color: #e7e7e7;
            padding: 20px;
            border: 1.5px solid #d0d0d0;
        }

        .tm-table tr:last-child td:first-child {
            border-radius: 0 0 0 4px;
        }

        .tm-table tr:last-child td:last-child {
            border-radius: 0 0 4px 0;
        }

        /* ── Footer note ──
           Figma node: 12830:5028
           Regular 400, 18px, lh 1.45, tracking 0.18px, #e7e7e7 */
        .tm-note {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: var(--brand-body-l-size);
            line-height: 1.45;
            letter-spacing: 0.18px;
            color: #e7e7e7;
        }

        /* ── RIGHT: Image ── flex:1, self-stretch, object-cover */
        /* Figma: flex-[1_0_0], h-full, size-full, object-cover */
        .tm-right {
            flex: 1 0 0;
            min-width: 0;
            align-self: stretch;
            position: relative;
            overflow: hidden;
        }

        .tm-right img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
    </style>
</head>

<body>

    <!-- TABLE MEDIA — Figma node 12830:5002 -->
    <!-- Bordered card: data table left (flex:1) + image right (flex:1) -->
    <!-- Extends split-card-left pattern with outer border wrapper & 50/50 columns -->
    <div class="tm-card" data-node-id="12830:5002" id="table-media">

        <!-- LEFT: Table + note — node 12830:5003 -->
        <div class="tm-left" data-node-id="12830:5003">

            <!-- Data table — node 12830:5004 -->
            <table class="tm-table" data-node-id="12830:5004">
                <thead>
                    <tr data-node-id="12830:5005">
                        <th data-node-id="12830:5006">Configuration</th>
                        <th data-node-id="12830:5008">Simulated Disc Pressure</th>
                    </tr>
                </thead>
                <tbody>
                    <tr data-node-id="12830:5010">
                        <td data-node-id="12830:5011">Standard Office Chair</td>
                        <td data-node-id="12830:5013">0.7 MPa</td>
                    </tr>
                    <tr data-node-id="12830:5015">
                        <td data-node-id="12830:5016">Anthros Chair</td>
                        <td data-node-id="12830:5018">0.5 MPa</td>
                    </tr>
                    <tr data-node-id="12830:5020">
                        <td data-node-id="12830:5021">Tilt</td>
                        <td data-node-id="12830:5023">0.3 MPa</td>
                    </tr>
                </tbody>
            </table>

            <!-- Footer note — node 12830:5028 -->
            <p class="tm-note" data-node-id="12830:5028">This simulation aligns perfectly with the university findings —
                showing the two-part system's ability to outperform traditional lumbar designs in load reduction and
                comfort.</p>

        </div>

        <!-- RIGHT: Image — node 12830:5029 -->
        <div class="tm-right" data-node-id="12830:5029">
            <img src="../assets/images/Digital human simulation-image.png"
                alt="Digital human biomechanics simulation showing disc pressure across postures" />
        </div>

    </div>

</body>

</html>
