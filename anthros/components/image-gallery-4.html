<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — Image Gallery 4</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--brand-color-ivory);
            font-family: var(--brand-font-primary);
        }

        /* ══════════════════════════════════════════
           IMAGE GALLERY 4
           Horizontal 4-image row
           Figma node: 12830:4982
           Height: 270px | Gap: 30px
           Each image: flex:1 (equal widths), object-cover
        ══════════════════════════════════════════ */
        .ig4-section {
            width: 100%;
            background-color: var(--brand-color-ivory);
            padding: 0 40px;
        }

        .ig4-row {
            display: flex;
            gap: 30px;
            align-items: stretch;
            width: 100%;
        }

        /* Each image slot — equal width, fixed height, overflow hidden */
        .ig4-slot {
            flex: 1 0 0;
            height: 270px;
            min-width: 0;
            position: relative;
            overflow: hidden;
        }

        .ig4-slot img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
    </style>
</head>

<body>

    <!-- IMAGE GALLERY 4 — Figma node 12830:4982 -->
    <!-- 4 equal-width photos in a horizontal row, fixed 270px height -->
    <section class="ig4-section" data-node-id="12830:4982" id="image-gallery-4">

        <div class="ig4-row">

            <div class="ig4-slot" data-node-id="12830:4983" data-name="Validation-01">
                <img src="../assets/images/Validation-01.png" alt="University of Waterloo study — participant 1" />
            </div>

            <div class="ig4-slot" data-node-id="12830:4984" data-name="Validation-02">
                <img src="../assets/images/Validation-02.png" alt="University of Waterloo study — participant 2" />
            </div>

            <div class="ig4-slot" data-node-id="12830:4985" data-name="Validation-03">
                <img src="../assets/images/Validation-03.png" alt="University of Waterloo study — participant 3" />
            </div>

            <div class="ig4-slot" data-node-id="12830:4986" data-name="Validation-04">
                <img src="../assets/images/Validation-04.png" alt="University of Waterloo study — participant 4" />
            </div>

        </div>

    </section>

</body>

</html>
