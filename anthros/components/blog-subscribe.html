<!-- SUBSCRIBE TO BLOG COMPONENT -->
<section class="blog-subscribe-module">
    <div class="blog-subscribe-inner">
        <!-- Text Column -->
        <div class="bsm-text-col">
            <h3 class="bsm-title">SUBSCRIBE TO OUR BLOG</h3>
            <p class="bsm-desc">Stay up to date on the latest news, trends, and developments in the office chair
                industry. We love humans, we are committed to creating educational materials to address topics related
                to sitting well and living pain-free.</p>
        </div>

        <!-- Form Column -->
        <div class="bsm-form-col">
            <form onsubmit="event.preventDefault();" aria-label="Subscribe to blog form">
                <div class="bsm-input-group">
                    <!-- Text inputs -->
                    <input type="text" class="bsm-input" placeholder="Name" aria-label="First Name">
                    <input type="email" class="bsm-input" placeholder="Email" aria-label="Email Address">

                    <!-- Use branded checklist for frequency options -->
                    <div class="bsm-options">
                        <ul class="aws-checklist bsm-frequency-list">
                            <li class="selected" data-value="instant">Instant</li>
                            <li data-value="daily">Daily</li>
                            <li class="selected" data-value="weekly">Weekly</li>
                            <li data-value="monthly">Monthly</li>
                        </ul>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="bsm-submit-btn">SUBSCRIBE</button>
                </div>
            </form>
        </div>
    </div>
</section>
