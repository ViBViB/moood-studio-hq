<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — Designed for Every Body</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--brand-color-ivory);
            font-family: var(--brand-font-primary);
        }

        /* ══════════════════════════════════════════
           SECTION: Designed for Every Body
           Figma node: 12830:5130
           Centered tagline + H2 headline on ivory bg
        ══════════════════════════════════════════ */
        .dfeb-section {
            width: 100%;
            background-color: var(--brand-color-ivory);
            padding: 112px 40px;
            display: flex;
            justify-content: center;
        }

        .dfeb-inner {
            width: 100%;
            max-width: 1360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
        }

        /* Tagline ——
           Clarika Regular (400), 18px, lh: 1, tracking: 3.6px */
        .dfeb-tagline {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: var(--brand-body-l-size);
            line-height: 1;
            letter-spacing: 3.6px;
            color: #121212;
            text-transform: uppercase;
        }

        /* H2 Headline Block ——
           Clarika Black (900), 64px, lh: 1.1, tracking: -0.64px */
        .dfeb-h2 {
            display: flex;
            flex-direction: column;
            font-family: var(--brand-font-primary);
            font-weight: 900;
            font-size: 64px;
            line-height: 1.1;
            letter-spacing: -0.64px;
            text-transform: uppercase;
        }

        .dfeb-h2-line--solid {
            color: #121212;
        }

        /* "EVERY BODY" — outlined text via CSS text-stroke */
        .dfeb-h2-line--outlined {
            color: transparent;
            -webkit-text-stroke: 2px #121212;
        }
    </style>
</head>

<body>

    <section class="dfeb-section" id="designed-for-everyone">
        <div class="dfeb-inner" data-node-id="12830:5130">

            <!-- Tagline — node 12830:5131 -->
            <p class="dfeb-tagline" data-node-id="12830:5131">Precision Posture System:</p>

            <!-- H2 Headline — node 12830:5132 -->
            <div class="dfeb-h2" data-node-id="12830:5132">
                <span class="dfeb-h2-line--solid" data-node-id="12830:5133">Designed For</span>
                <span class="dfeb-h2-line--outlined" data-node-id="12830:5134">Every Body</span>
            </div>

        </div>
    </section>

</body>

</html>
