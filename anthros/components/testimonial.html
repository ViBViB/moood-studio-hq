<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — Testimonial</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--brand-color-ivory);
            font-family: var(--brand-font-primary);
            padding: 40px;
        }

        /* ══════════════════════════════════════════
           TESTIMONIAL
           White rounded box: quote + logo attribution
           Figma node: 12830:4987
           Bg: white | border-radius: 24px | p: 64px
           Inner: flex-col, gap-10px, items-center
        ══════════════════════════════════════════ */
        .tm-card {
            background-color: #ffffff;
            border-radius: 24px;
            padding: 64px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            width: 100%;
        }

        /* ── Quote icon — 72×72px ── */
        .tm-quote-icon {
            display: block;
            width: 72px;
            height: 72px;
            flex-shrink: 0;
        }

        /* ── Inner content container ── */
        .tm-content {
            display: flex;
            flex-direction: column;
            gap: 32px;
            align-items: center;
            width: 100%;
            max-width: 1184px;
        }

        /* ── Quote text ──
           Figma node: 12830:4991
           Clarika Heavy (800), 40px, lh: 1.2, tracking: -0.8px, uppercase, center, #121212 */
        .tm-quote {
            font-family: var(--brand-font-primary);
            font-weight: 800;
            font-size: 40px;
            line-height: 1.2;
            letter-spacing: -0.8px;
            text-transform: uppercase;
            text-align: center;
            color: #121212;
            width: 100%;
        }

        /* ── Attribution block ── */
        /* Figma node: 12830:4992 — flex-col, gap-4px, items-center */
        .tm-attribution {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }

        /* ── University of Waterloo logo pill ──
           Figma node: 12830:4993
           bg-[#4263a9] | w-118px | px-12px pt-12px pb-9px | border-radius 8px */
        .tm-logo-pill {
            background-color: #4263a9;
            width: 118px;
            padding: 12px 12px 9px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tm-logo-pill img {
            display: block;
            width: 100%;
            height: auto;
        }

        /* ── Attribution text ──
           Figma node: 12830:4995
           Clarika Regular (400), 20px, lh: 1.5, tracking: 0.2px, center, #121212 */
        .tm-attribution-text {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: 20px;
            line-height: 1.5;
            letter-spacing: 0.2px;
            text-align: center;
            color: #121212;
        }
    </style>
</head>

<body>

    <!-- TESTIMONIAL — Figma node 12830:4987 -->
    <!-- White rounded card: quote icon + H4 quote + logo attribution -->
    <div class="tm-card" data-node-id="12830:4987" id="testimonial">

        <!-- Quote icon — 72×72px — node 12830:4988 -->
        <img class="tm-quote-icon" src="../assets/images/icon-quote.svg" alt="" aria-hidden="true"
            data-node-id="12830:4988" />

        <!-- Content: quote + attribution — node 12830:4990 -->
        <div class="tm-content" data-node-id="12830:4990">

            <!-- Quote text — node 12830:4991 -->
            <p class="tm-quote" data-node-id="12830:4991">"The chair's lower support was effective in restricting
                posterior rotation of the pelvis… facilitating a posture closer to neutral."</p>

            <!-- Attribution — node 12830:4992 -->
            <div class="tm-attribution" data-node-id="12830:4992">

                <!-- UWaterloo logo pill — node 12830:4993 -->
                <div class="tm-logo-pill" data-node-id="12830:4993">
                    <img src="../assets/images/logo-waterloo.png" alt="University of Waterloo"
                        data-node-id="12830:4994" />
                </div>

                <!-- Attribution text — node 12830:4995 -->
                <p class="tm-attribution-text" data-node-id="12830:4995">— University of Waterloo Report, 2025</p>

            </div>

        </div>

    </div>

</body>

</html>
