<style>
    /* ── HERO PINNED SECTION ── */
    #hero-spring {
        height: 100vh;
        width: 100%;
        position: relative;
        overflow: hidden;
    }

    #hero-inner {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .spring-h1 {
        font-family: var(--brand-font-primary);
        font-weight: 900;
        font-size: var(--brand-h1-large-size);
        line-height: var(--brand-h1-large-leading);
        text-transform: uppercase;
        color: #fff;
        margin: 0;
        pointer-events: none;
    }

    #headline-left {
        position: absolute;
        top: 35%;
        left: 8rem;
        width: 26%;
        text-align: right;
        z-index: 5;
    }

    #headline-right {
        position: absolute;
        top: 35%;
        right: 8rem;
        width: 26%;
        text-align: left;
        z-index: 5;
    }

    #hero-image {
        position: relative;
        z-index: 30;
        width: 1040px;
        height: 780px;
        flex-shrink: 0;
    }

    #hero-image img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: absolute;
        inset: 0;
    }

    .chair-main {
        z-index: 35;
    }

    .chair-secondary {
        z-index: 34;
        opacity: 0;
    }

    #hero-cta {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
    }

    .btn-spring-cta {
        background: var(--brand-color-cyan);
        color: #000;
        padding: 16px 40px;
        border-radius: 100px;
        font-family: var(--brand-font-primary);
        font-weight: 700;
        font-size: var(--brand-body-std-size);
        text-transform: uppercase;
        text-decoration: none;
        letter-spacing: 0.05em;
        white-space: nowrap;
        display: inline-block;
    }

    .spring-scroll-hint {
        font-family: var(--brand-font-primary);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #fff;
        opacity: 0.5;
    }
</style>

<section id="hero-spring">
    <div id="hero-inner">
        <div id="headline-left">
            <h1 class="spring-h1">Office chairs<br>fail the<br>light user.</h1>
        </div>
        <div id="hero-image">
            <img src="../assets/images/hero-chair2.png" alt="Anthros Chair Side" class="chair-secondary"
                id="chair-left" />
            <img src="../assets/images/hero-chair3.png" alt="Anthros Chair Side" class="chair-secondary"
                id="chair-right" />
            <img src="../assets/images/a chair for every body.png" alt="Anthros Chair — A chair for every body"
                class="chair-main" />
        </div>
        <div id="headline-right">
            <h1 class="spring-h1">We built a<br>chair that<br>tilts for<br>every body.</h1>
        </div>
        <div id="hero-cta">
            <a href="https://configurator.anthros.com/products/chair" class="btn-spring-cta">Fix your sit →</a>
            <span class="spring-scroll-hint">↓ Scroll to know more</span>
        </div>
    </div>
</section>

<script>
    document.addEventListener("DOMContentLoaded", (event) => {
        gsap.registerPlugin(ScrollTrigger);

        // Navbar: hide when hero scrolls out of view, restore on scroll back up
        ScrollTrigger.create({
            trigger: "#hero-spring",
            start: "top top",
            end: "bottom top",
            onLeave: () => {
                const nav = document.getElementById('anthros-navbar');
                if (nav) nav.classList.add('nav-hidden');
            },
            onEnterBack: () => {
                const nav = document.getElementById('anthros-navbar');
                if (nav) nav.classList.remove('nav-hidden');
            },
        });

        // ── SPRING HERO SEQUENCE ──
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#hero-spring",
                start: "top top",
                end: "+=2400",
                scrub: 1.2,
                pin: true,
                anticipatePin: 1,
            }
        });

        // Calculate travel distance to centre for each headline
        const hlLeft = document.getElementById('headline-left');
        const hlRight = document.getElementById('headline-right');

        if (hlLeft && hlRight) {
            const leftToCenterX = hlLeft.getBoundingClientRect().right + (window.innerWidth / 2 - hlLeft.getBoundingClientRect().right);
            const rightToCenterX = -(hlRight.getBoundingClientRect().left - window.innerWidth / 2);

            // Phase 1 — bg: black → white, text colors adapt
            tl.to("body", { backgroundColor: "#ffffff", duration: 3, ease: "none" }, 0);
            tl.to(".spring-h1, .spring-scroll-hint", { color: "#000000", duration: 3, ease: "none" }, 0);
            tl.to(".navbar-links a, .btn-shop-now", { color: "#000000", borderColor: "#000000", duration: 3, ease: "none" }, 0);
            tl.to(".logo-img", { filter: "invert(1)", duration: 3, ease: "none" }, 0);

            // Headlines slide toward centre
            tl.to("#headline-left", { x: leftToCenterX, duration: 3, ease: "power2.inOut" }, 0);
            tl.to("#headline-right", { x: rightToCenterX, duration: 3, ease: "power2.inOut" }, 0);

            // Phase 2 — Early fade: texts & bottom row vanish before reaching centre
            tl.to("#headline-left, #headline-right, #hero-cta", { opacity: 0, duration: 1.0, ease: "power2.in" }, 0.5);

            // Image blooms after texts fade
            tl.to("#hero-image", { width: "1248px", height: "936px", duration: 1.2, ease: "power2.out" }, 1.2);

            // Massive Triple Chair Bloom: Secondary chairs slide out from center
            tl.to("#chair-left", { x: -600, opacity: 1, duration: 1.2, ease: "power2.out" }, 1.2);
            tl.to("#chair-right", { x: 600, opacity: 1, duration: 1.2, ease: "power2.out" }, 1.2);
        }
    });
</script>
