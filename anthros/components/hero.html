<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — Hero Component</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />
    <style>
        /* ── COMPONENT: Hero ────────────────────────────────────────
       Figma Node: 12830:4803
       File: 2.0 ANTHROS — OFFICIAL FIGMA V2.0
       Extracted: 2026-02-26
       Includes: Navbar (12830:5292) by reference
    ──────────────────────────────────────────────────────────── */

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--brand-font-primary);
            background-color: var(--brand-color-black);
            overflow-x: hidden;
        }

        /* ══════════════════════════════════════════════════════════
       NAVBAR (12830:5292) — Included by reference, not rebuilt
    ══════════════════════════════════════════════════════════ */
        .anthros-navbar {
            width: 100%;
            background-color: var(--brand-color-black);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 40px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            padding: 9.29px 0;
            flex-shrink: 0;
            text-decoration: none;
        }

        .navbar-logo img {
            height: 49px;
            width: auto;
            display: block;
        }

        .navbar-links {
            display: flex;
            align-items: center;
            gap: 43px;
            list-style: none;
        }

        .navbar-links a {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: 16px;
            line-height: 1.6;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--brand-color-white);
            text-decoration: none;
            white-space: nowrap;
            transition: opacity 0.2s ease;
        }

        .navbar-links a:hover {
            opacity: 0.6;
        }

        .navbar-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            flex-shrink: 0;
        }

        .navbar-utils {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-utils-icon {
            width: 13px;
            height: 13px;
            display: block;
            flex-shrink: 0;
        }

        .navbar-utils-sep {
            width: 2px;
            height: 2px;
            background-color: var(--brand-color-white);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .navbar-utils a {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: 12px;
            line-height: 1;
            letter-spacing: 1.92px;
            text-transform: uppercase;
            color: var(--brand-color-white);
            text-decoration: none;
            white-space: nowrap;
            transition: opacity 0.2s ease;
        }

        .navbar-utils a:hover {
            opacity: 0.6;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-shop-now {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 21px;
            border: 1px solid var(--brand-color-white);
            border-radius: var(--brand-radius-pill);
            font-family: var(--brand-font-primary);
            font-weight: 500;
            font-size: var(--brand-body-std-size);
            line-height: 1.5;
            text-transform: uppercase;
            color: var(--brand-color-white);
            text-decoration: none;
            white-space: nowrap;
            transition: background-color 0.2s ease, color 0.2s ease;
            cursor: pointer;
        }

        .btn-shop-now:hover {
            background-color: var(--brand-color-white);
            color: var(--brand-color-black);
        }

        .navbar-icons {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .navbar-icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .navbar-icon-btn:hover {
            opacity: 0.6;
        }

        .navbar-icon-btn.user img {
            width: 25px;
            height: 25px;
        }

        .navbar-icon-btn.cart img {
            width: 27px;
            height: 27px;
        }


        /* ══════════════════════════════════════════════════════════
       HERO SECTION (12830:4803)
    ══════════════════════════════════════════════════════════ */
        .hero-section {
            position: relative;
            width: 100%;
            height: 827px;
            /* Figma: exact frame height */
            background-color: var(--brand-color-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 140px 40px 40px;
            /* pt=140 pb=40 px=40 per Figma */
            overflow: hidden;
        }

        /* ── Two-column container ── */
        .hero-container {
            display: flex;
            gap: 80px;
            /* --spacing/padding/huge */
            align-items: flex-start;
            width: 100%;
            max-width: 1360px;
            /* Figma content max-width */
            margin: 0 auto;
            flex: 1;
        }

        /* ── LEFT: Media column ── */
        .hero-media {
            flex: 1 0 0;
            height: 647px;
            position: relative;
            min-width: 0;
            overflow: visible;
            /* Video bleeds intentionally per Figma */
        }

        /* Chair image — static base layer (video plays on top when server is active) */
        .hero-chair-img {
            position: absolute;
            right: -34px;
            top: -41px;
            width: 721px;
            height: 730px;
            object-fit: cover;
            display: block;
        }

        /* Video + fade overlay burst out of their parent */
        .hero-video-wrap {
            position: absolute;
            /* right: -34px, top: -41px, w: 721px, h: 730px (from Figma) */
            right: -34px;
            top: -41px;
            width: 721px;
            height: 730px;
        }

        .hero-video-wrap video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Right-edge gradient overlay (the PNG fade) */
        .hero-media-fade {
            position: absolute;
            right: -34px;
            top: -41px;
            width: 168px;
            height: 730px;
            pointer-events: none;
        }

        .hero-media-fade img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ── RIGHT: Content column ── */
        .hero-content-col {
            flex: 1 0 0;
            min-width: 0;
            display: flex;
            align-items: center;
            align-self: stretch;
            padding: 0 60px;
        }

        /* Figma 12830:4810 — outer container, gap between text-block and actions */
        .hero-content {
            display: flex;
            flex-direction: column;
            gap: 29px;
            /* → 35px visual: 29px CSS + 6px subtitle lh-overhang */
            width: 100%;
        }

        /* Figma 12830:4811 — title + subtitle block */
        .hero-text-block {
            display: flex;
            flex-direction: column;
            gap: 16px;
            /* Figma: gap-[16px] = --spacing/padding/xxsmall */
        }

        /* Headline: PRECISION / POSTURE SYSTEM */
        .hero-title {
            font-family: var(--brand-font-primary);
            font-weight: 900;
            font-size: var(--brand-h1-large-size);
            line-height: var(--brand-h1-large-leading);
            letter-spacing: var(--brand-h1-large-tracking);
            text-transform: uppercase;
        }

        .hero-title .word-cyan {
            color: #05c9f5;
            /* --text/text-brand-primary */
        }

        .hero-title .word-white {
            color: var(--brand-color-white);
        }

        /* Subtitle */
        .hero-subtitle {
            font-family: var(--brand-font-primary);
            font-weight: 700;
            /* Clarika Bold */
            font-size: var(--brand-body-std-size);
            line-height: var(--brand-body-l-leading);
            color: #e7e7e7;
            /* --text/text-invert */
            max-width: 424px;
        }

        /* Gap de descripción → CTA: 35px manejado por .hero-content gap */

        /* EXPLORE THE SCIENCE pill */
        .btn-explore {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 11px 46px;
            max-width: 350px;
            background-color: var(--brand-color-white);
            border: 1px solid var(--brand-color-black);
            border-radius: var(--brand-radius-pill);
            font-family: var(--brand-font-primary);
            font-weight: 500;
            /* Clarika Medium */
            font-size: var(--brand-body-l-size);
            line-height: 1.5;
            letter-spacing: 0.2px;
            text-transform: uppercase;
            color: var(--brand-color-black);
            text-decoration: none;
            white-space: nowrap;
            transition: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease;
            cursor: pointer;
        }

        .btn-explore:hover {
            background-color: var(--brand-color-black);
            color: var(--brand-color-white);
            border-color: var(--brand-color-white);
        }

        /* Scroll arrow — removed (not present in Figma node 12830:4803) */

        /* ── Responsive ── */
        @media (max-width: 1100px) {
            .hero-video-wrap {
                width: 100%;
                right: 0;
            }

            .hero-media-fade {
                right: 0;
            }
        }

        @media (max-width: 900px) {
            .hero-container {
                flex-direction: column;
                gap: 40px;
            }

            .hero-media {
                width: 100%;
                height: 340px;
            }

            .hero-video-wrap {
                position: relative;
                top: 0;
                right: 0;
                width: 100%;
                height: 340px;
            }

            .hero-media-fade {
                display: none;
            }

            .hero-content-col {
                padding: 0;
            }

            .hero-title {
                font-size: 52px;
            }
        }

        @media (max-width: 600px) {
            .hero-section {
                padding: 120px 24px 60px;
            }

            .hero-title {
                font-size: 38px;
            }

            .hero-subtitle {
                font-size: var(--brand-body-l-size);
            }

            .btn-explore {
                font-size: 16px;
                padding: 11px 32px;
            }

            .navbar-links,
            .navbar-right {
                display: none;
            }
        }
    </style>
</head>

<body>
