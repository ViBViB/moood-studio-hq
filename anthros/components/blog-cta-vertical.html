<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — Blog CTA Vertical (Centered)</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />
    <link rel="stylesheet" href="../pages/style.css" />

    <style>
        /* Standalone overrides if necessary, but it uses classes from style.css */
        body {
            background-color: #f6f6f6;
        }

        /* The vertical/centered layout is defined via inline styles in the block 
           to differentiate from the original horizontal blog-cta */
    </style>
</head>

<body>

    <!-- CTA SECTION (Anthros DNA - Centered Vertical Variant) -->
    <section class="blog-cta"
        style="padding-top: 130px; padding-bottom: 130px; height: auto; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;">
        <div class="blog-cta-inner" style="padding: 0 64px; justify-content: center; text-align: center;">
            <div class="blog-cta-content" style="max-width: 900px; align-items: center; margin: 0 auto; gap: 30px;">
                <div class="blog-cta-rating" style="justify-content: center;">
                    <img src="../assets/images/icon-step-1.svg" alt="Star" style="display:none;">
                    <span>JOIN 5,240+ PAIN-FREE SITTERS</span>
                </div>
                <h2 class="blog-cta-title" style="color: #121212;">This is more than a chair.</h2>

                <img src="../assets/images/Chair-collection.png" alt="Anthros chair collection"
                    style="width: 100%; height: auto; object-fit: contain; margin: 20px 0;">

                <div style="display: flex; flex-direction: column; align-items: center; margin-top: 10px;">
                    <p
                        style="color: var(--brand-color-black); margin-bottom: 30px; font-family: var(--brand-font-primary); font-size: var(--brand-body-l-size);">
                        It’s a proven posture system. And the data speaks for itself.
                    </p>
                    <a href="#" class="blog-cta-btn">Discover the Anthros Chair</a>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
