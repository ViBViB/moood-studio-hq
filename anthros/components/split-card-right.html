<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — Split Card Right</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            font-family: var(--brand-font-primary);
        }

        /* ══════════════════════════════════════════
           SPLIT CARD RIGHT
           Layout: [IMAGE CARD LEFT] [COPY RIGHT]
           Figma node: 12830:4881
           Background: black | padding: 112px 120px
           Max-width inner: 1200px | Col gap: 64px
        ══════════════════════════════════════════ */
        .scr-section {
            width: 100%;
            background-color: #000000;
            padding: 112px 120px;
            display: flex;
            justify-content: center;
        }

        .scr-row {
            display: flex;
            gap: 64px;
            align-items: center;
            width: 100%;
            max-width: 1200px;
        }

        /* ── LEFT: Image card ── */
        /* Figma: bg-[#f8f8f8] w-[425px] py-[30px] */
        .scr-img-card {
            flex-shrink: 0;
            width: 425px;
            background-color: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 0;
        }

        .scr-img-card img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        /* ── RIGHT: Content column ── */
        /* Figma: flex-[1_0_0] flex-col gap-[32px] */
        .scr-content {
            flex: 1 0 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* ── H1 Headline block ──
           Figma node: 12830:4888
           Clarika Black (900), 72px, lh: 1.1, tracking: -0.72px, uppercase */
        .scr-h1 {
            display: flex;
            flex-direction: column;
        }

        .scr-h1-line {
            font-family: var(--brand-font-primary);
            font-weight: 900;
            font-size: 72px;
            line-height: 1.1;
            letter-spacing: -0.72px;
            text-transform: uppercase;
        }

        .scr-h1-line--white {
            color: #ffffff;
        }

        .scr-h1-line--cyan {
            color: #05c9f5;
        }

        /* Inline row for "in Its SAFE ZONE" */
        .scr-h1-inline-row {
            display: flex;
            gap: 16px;
            align-items: baseline;
        }

        /* ── Body text ──
           Clarika Regular (400), 18px, lh: 1.45, tracking: 0.18px, #e7e7e7 */
        .scr-body {
            font-family: var(--brand-font-primary);
            font-weight: 400;
            font-size: var(--brand-body-l-size);
            line-height: 1.45;
            letter-spacing: 0.18px;
            color: #e7e7e7;
        }

        .scr-body strong {
            font-weight: 700;
        }
    </style>
</head>

<body>

    <!-- SPLIT CARD RIGHT — Figma node 12830:4881 -->
    <!-- Layout: [IMAGE CARD LEFT] [COPY RIGHT] — dark background -->
    <section class="scr-section" data-node-id="12830:4881" id="split-card-right">

        <div class="scr-row">

            <!-- LEFT: Image card — Figma node 12830:4882 -->
            <div class="scr-img-card" data-node-id="12830:4882">
                <img src="../assets/images/Safe zone-image.png"
                    alt="Lumbar flexion gauge showing safe zone (5°) and danger zone (15°)" />
            </div>

            <!-- RIGHT: Headline + body — Figma node 12830:4887 -->
            <div class="scr-content" data-node-id="12830:4887">

                <!-- H1 — node 12830:4888 -->
                <div class="scr-h1" data-node-id="12830:4888">
                    <span class="scr-h1-line scr-h1-line--white" data-node-id="12830:4889">Keeping the Spine</span>
                    <div class="scr-h1-inline-row" data-node-id="12830:4890">
                        <span class="scr-h1-line scr-h1-line--white" data-node-id="12830:4891">in Its</span>
                        <span class="scr-h1-line scr-h1-line--cyan" data-node-id="12830:4892">Safe Zone</span>
                    </div>
                </div>

                <!-- Body — node 12830:4893 -->
                <p class="scr-body" data-node-id="12830:4893">The lumbar spine's two most mobile joints, <strong>L4–L5
                        and L5–S1,</strong> are where most flexion and loading occur when sitting. Both <strong>Pope et
                        al. (1986)</strong> and <strong>White &amp; Panjabi (1990)</strong> quantified segmental lumbar
                    ranges of motion in healthy adults.</p>

            </div>

        </div>

    </section>

</body>

</html>
