<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthros — Tilt Mode Card</title>
    <link rel="stylesheet" href="../core/brand-tokens.css" />

    <style>
        /* ── Reset ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            font-family: var(--brand-font-primary);
            padding: 40px;
        }

        /* ══════════════════════════════════════════
           TILT MODE CARD
           Figma node: 12830:6745
           Border: 1px solid #b9b9b9
           Background: Black
           Padding: 30px
        ══════════════════════════════════════════ */
        .tm-card {
            background-color: #000000;
            border: 1px solid #b9b9b9;
            border-radius: 4px;
            padding: 30px;
            display: flex;
            gap: 24px;
            max-width: 650px;
            width: 100%;
        }

        /* ── Left: Recline Image ── */
        .tm-media {
            flex-shrink: 0;
            width: 236px;
            height: 317px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .tm-recline-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ── Right: Content ── */
        .tm-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .tm-title {
            font-weight: 900;
            font-size: 30px;
            letter-spacing: -1.2px;
            text-transform: uppercase;
            line-height: 0.99;
            margin-bottom: 24px;
            padding: 15px 0;
        }

        .tm-label {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 0.2px;
            color: #e7e7e7;
            margin-bottom: 12px;
        }

        .tm-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 24px;
        }

        .tm-list-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: var(--brand-body-l-size);
            color: #e7e7e7;
            line-height: 1.45;
        }

        .tm-tick {
            width: 14px;
            height: 12px;
            flex-shrink: 0;
        }

        .tm-description-label {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 0.2px;
            color: #e7e7e7;
            margin-bottom: 8px;
        }

        .tm-description {
            font-size: var(--brand-body-l-size);
            line-height: 1.5;
            color: #e7e7e7;
        }
    </style>
</head>

<body>

    <div class="tm-card" data-node-id="12830:6745">

        <!-- Recline Visual -->
        <div class="tm-media" data-node-id="12830:6746">
            <img class="tm-recline-img" src="../assets/images/chair-recline-active.png" alt="Active Mode -2°" />
        </div>

        <!-- Content -->
        <div class="tm-content" data-node-id="12830:6749">
            <h3 class="tm-title" data-node-id="12831:6751">–2° | Active Mode</h3>

            <p class="tm-label">Best For:</p>
            <ul class="tm-list" data-node-id="12830:6753">
                <li class="tm-list-item">
                    <img class="tm-tick" src="../assets/images/icon-tick-skyblue.svg" alt="" aria-hidden="true" />
                    High-focus tasks
                </li>
                <li class="tm-list-item">
                    <img class="tm-tick" src="../assets/images/icon-tick-skyblue.svg" alt="" aria-hidden="true" />
                    Upright sitters
                </li>
                <li class="tm-list-item">
                    <img class="tm-tick" src="../assets/images/icon-tick-skyblue.svg" alt="" aria-hidden="true" />
                    Short, intense work periods
                </li>
            </ul>

            <p class="tm-description-label">What It Does:</p>
            <p class="tm-description" data-node-id="12830:6768">
                Puts you slightly forward, ideal for precision work without collapsing posture.
            </p>
        </div>

    </div>

</body>

</html>
