<style>
    #section-tilting {
        background-color: #ffffff;
        padding: 120px 0;
        overflow: hidden;
        transition: background-color 0.3s ease;
    }

    .highlights-header {
        max-width: 1360px;
        margin: 0 auto 60px;
        padding: 0 40px;
    }

    .highlights-title {
        font-family: var(--brand-font-primary);
        font-size: var(--brand-h2-size);
        line-height: 1.1;
        letter-spacing: var(--brand-h2-tracking);
        font-weight: 900;
        text-transform: uppercase;
        color: #000000;
        text-align: left;
        margin: 0;
    }

    /* Carousel Styles */
    .highlights-container {
        width: 100%;
        position: relative;
    }

    .highlights-carousel {
        display: flex;
        gap: 24px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        padding: 0 40px 60px;
        -ms-overflow-style: none;
        scrollbar-width: none;
        cursor: grab;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
    }

    .highlights-carousel:active {
        cursor: grabbing;
    }

    /* Dynamic padding to align with left-aligned title (1360px max width + 40px padding) */
    @media (min-width: 1360px) {
        .highlights-carousel {
            padding-left: calc((100% - 1360px) / 2 + 40px);
            padding-right: 0px;
            /* Managed by spacer */
            scroll-padding-left: calc((100% - 1360px) / 2 + 40px);
        }
    }

    .carousel-spacer {
        flex: 0 0 calc(100vw - 1000px - (max(40px, (100vw - 1360px) / 2 + 40px)));
        scroll-snap-align: none;
    }

    @media (max-width: 1024px) {
        .carousel-spacer {
            flex: 0 0 10vw;
        }
    }

    .highlights-carousel::-webkit-scrollbar {
        display: none;
    }

    .highlight-card {
        flex: 0 0 90vw;
        max-width: 1000px;
        height: 600px;
        background: #000000;
        border-radius: 28px;
        scroll-snap-align: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        user-select: none;
    }

    @media (min-width: 1024px) {
        .highlight-card {
            flex: 0 0 1000px;
            scroll-snap-align: start;
        }
    }

    .card-media {
        width: 101%;
        height: 100%;
        background-color: #000000;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .card-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 48px;
        background: linear-gradient(0deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.8) 40%, rgba(255, 255, 255, 0) 100%);
    }

    .card-tag {
        font-family: var(--brand-font-primary);
        font-size: 14px;
        font-weight: 700;
        color: var(--brand-color-black);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 12px;
        /* Animation initial state */
        opacity: 0;
        transform: translateX(100px);
        transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .card-headline {
        font-family: var(--brand-font-primary);
        font-size: 36px;
        font-weight: 900;
        line-height: 1.05;
        color: var(--brand-color-black);
        text-transform: uppercase;
        /* Animation initial state */
        opacity: 0;
        transform: translateX(100px);
        transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* Active states for staggered animation */
    .highlight-card.card-active .card-tag {
        opacity: 1;
        transform: translateX(0);
    }

    .highlight-card.card-active .card-headline {
        opacity: 1;
        transform: translateX(0);
        transition-delay: 0.1s;
    }

    /* Indicators */
    .carousel-indicators {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 20px;
    }

    .indicator-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .indicator-dot.active {
        background: #000000;
        width: 24px;
        border-radius: 4px;
    }
</style>

<section id="section-tilting">
    <div class="highlights-header">
        <h2 class="highlights-title">Clinically Engineered<br>Motion.</h2>
    </div>

    <div class="highlights-container">
        <div class="highlights-carousel" id="highlights-carousel">
            <!-- Card 1: Engineering -->
            <div class="highlight-card">
                <div class="card-media" style="background-image: url('../assets/images/Different-weight.jpg');"></div>
                <div class="card-overlay">
                    <div class="card-tag">Engineering</div>
                    <h3 class="card-headline">Different weight.<br>Identical Performance.</h3>
                </div>
            </div>

            <!-- Card 2: Biomechanics -->
            <div class="highlight-card">
                <div class="card-media" style="background-image: url('../assets/images/Active-sitting2.jpg');"></div>
                <div class="card-overlay">
                    <div class="card-tag">Biomechanics</div>
                    <h3 class="card-headline">Active Sitting.<br>Forward Tilt.</h3>
                </div>
            </div>

            <!-- Card 3: Materials -->
            <div class="highlight-card">
                <div class="card-media" style="background-image: url('../assets/images/Soft-adaptative-comfort.jpg');">
                </div>
                <div class="card-overlay">
                    <div class="card-tag">Materials</div>
                    <h3 class="card-headline">Adaptive, clinical comfort<br>with Cloutex®</h3>
                </div>
            </div>

            <!-- Card 4: Results -->
            <div class="highlight-card">
                <div class="card-media" style="background-image: url('../assets/images/Maximum-comfort.jpg');"></div>
                <div class="card-overlay">
                    <div class="card-tag">Results</div>
                    <h3 class="card-headline">Maximum Comfort.<br>Universal Calibration.</h3>
                </div>
            </div>

            <!-- End Spacer to allow 4th card to align left -->
            <div class="carousel-spacer"></div>
        </div>

        <div class="carousel-indicators">
            <div class="indicator-dot active"></div>
            <div class="indicator-dot"></div>
            <div class="indicator-dot"></div>
            <div class="indicator-dot"></div>
        </div>
    </div>
</section>

<script>
    document.addEventListener("DOMContentLoaded", (event) => {
        // ── HIGHLIGHTS CAROUSEL DOTS & INTERACTION ──
        const carousel = document.getElementById('highlights-carousel');
        const dots = document.querySelectorAll('.indicator-dot');
        const cards = carousel.querySelectorAll('.highlight-card');

        if (!carousel) return;

        // Scroll listener for dots - Position based for 100% accuracy
        carousel.addEventListener('scroll', () => {
            const containerRect = carousel.getBoundingClientRect();
            const containerLeft = containerRect.left + parseInt(window.getComputedStyle(carousel).paddingLeft);

            let activeIndex = 0;
            let minDiff = Infinity;

            cards.forEach((card, i) => {
                const cardRect = card.getBoundingClientRect();
                const diff = Math.abs(cardRect.left - containerLeft);
                if (diff < minDiff) {
                    minDiff = diff;
                    activeIndex = i;
                }
            });

            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === activeIndex);
            });

            cards.forEach((card, i) => {
                card.classList.toggle('card-active', i === activeIndex);
            });
        });

        // Trigger initial active state for first card
        if (cards.length > 0) {
            cards[0].classList.add('card-active');
        }

        // ── HIGHLIGHTS BACKGROUND TRANSITION (Unified & Symmetrical) ──
        const tilingSection = document.getElementById('section-tilting');
        const tilingTitle = document.querySelector('.highlights-title');
        const allDots = document.querySelectorAll('.indicator-dot');

        if (tilingSection && typeof gsap !== 'undefined') {
            const bgTl = gsap.timeline({
                scrollTrigger: {
                    trigger: tilingSection,
                    start: "top bottom",
                    end: "bottom top",
                    scrub: true,
                }
            });

            // 0% (top enters viewport) -> 30% (section reaches center): Fade to Black
            bgTl.fromTo(tilingSection, { backgroundColor: "#ffffff" }, { backgroundColor: "#000000", duration: 0.3, ease: "none" }, 0);
            bgTl.fromTo(tilingTitle, { color: "#000000" }, { color: "#ffffff", duration: 0.3, ease: "none" }, 0);
            bgTl.fromTo(allDots, { backgroundColor: "rgba(0,0,0,0.2)" }, { backgroundColor: "rgba(255,255,255,0.2)", duration: 0.3, ease: "none" }, 0);

            // Transition plateau: Black from 30% to 70% progress
            bgTl.to(tilingSection, { backgroundColor: "#000000", duration: 0.4 }, 0.3);

            // 70% progress -> 100% (bottom leaves viewport): Fade to White
            bgTl.to(tilingSection, { backgroundColor: "#ffffff", duration: 0.3, ease: "none" }, 0.7);
            bgTl.to(tilingTitle, { color: "#000000", duration: 0.3, ease: "none" }, 0.7);
            bgTl.to(allDots, { backgroundColor: "rgba(0,0,0,0.2)", duration: 0.3, ease: "none" }, 0.7);
        }

        // Click to scroll
        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => {
                const containerPadding = parseInt(window.getComputedStyle(carousel).paddingLeft);
                const targetScroll = cards[i].offsetLeft - containerPadding;
                carousel.scrollTo({ left: targetScroll, behavior: 'smooth' });
            });
        });

        // Drag to scroll for Desktop
        let isDown = false;
        let startX;
        let scrollLeft;

        carousel.addEventListener('mousedown', (e) => {
            isDown = true;
            carousel.classList.add('active');
            startX = e.pageX - carousel.offsetLeft;
            scrollLeft = carousel.scrollLeft;
            carousel.style.scrollSnapType = 'none';
            carousel.style.scrollBehavior = 'auto';
        });

        carousel.addEventListener('mouseleave', () => {
            isDown = false;
            carousel.style.scrollSnapType = 'x mandatory';
        });

        carousel.addEventListener('mouseup', () => {
            isDown = false;
            carousel.style.scrollSnapType = 'x mandatory';
            carousel.style.scrollBehavior = 'smooth';
        });

        carousel.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - carousel.offsetLeft;
            const walk = (x - startX) * 2;
            carousel.scrollLeft = scrollLeft - walk;
        });
    });
</script>
