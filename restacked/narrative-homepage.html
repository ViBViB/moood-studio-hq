// ── HELPERS ─────────────────────────────────────────
function getInitials(name) {
    return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}
function timeAgo(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function showStatus(msg, isError = false) {
    const el = document.getElementById('db-status');
    el.textContent = msg;
    el.className = 'nv-db-status visible' + (isError ? ' error' : '');
    setTimeout(() => el.className = 'nv-db-status', 2500);
}

// ── COMMENTING SYSTEM ────────────────────────────────
function renderFeedbackBlock(sectionId) {
    return `
        <button class="nv-feedback-toggle" onclick="toggleFeedback('${sectionId}')">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 1H2C1.45 1 1 1.45 1 2v9c0 .55.45 1 1 1h2v3l3-3h7c.55 0 1-.45 1-1V2c0-.55-.45-1-1-1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            </svg>
            Leave feedback
        </button>
        <div class="nv-feedback-panel" id="panel-${sectionId}">
            <div class="nv-feedback-form">
                <div class="nv-feedback-form-row">
                    <input type="text" id="name-${sectionId}" placeholder="Your name" maxlength="60">
                    <button class="nv-feedback-submit" onclick="submitComment('${sectionId}')">Send</button>
                </div>
                <textarea id="comment-${sectionId}" placeholder="Your feedback on this section..."></textarea>
            </div>
            <div class="nv-comments-list" id="comments-${sectionId}">
                <p class="nv-feedback-empty">No feedback yet.</p>
            </div>
        </div>
    `;
}

function toggleFeedback(sectionId) {
    const panel = document.getElementById('panel-' + sectionId);
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
        loadComments(sectionId);
        document.getElementById('name-' + sectionId).focus();
    }
}

async function submitComment(sectionId) {
    const nameEl = document.getElementById('name-' + sectionId);
    const commentEl = document.getElementById('comment-' + sectionId);
    const btn = document.querySelector(`#panel-${sectionId} .nv-feedback-submit`);
    const name = nameEl.value.trim();
    const comment = commentEl.value.trim();
    if (!name || !comment) { showStatus('Please fill in both fields.', true); return; }
    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
        await db.collection('narratives').doc(NARRATIVE_ID)
            .collection('sections').doc(sectionId)
            .collection('comments').add({
                name, comment,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        commentEl.value = '';
        btn.textContent = 'Send';
        btn.disabled = false;
        showStatus('Feedback sent ✓');
        loadComments(sectionId);
    } catch (e) {
        btn.textContent = 'Send';
        btn.disabled = false;
        showStatus('Error — Firestore not set up yet.', true);
    }
}

async function loadComments(sectionId) {
    const container = document.getElementById('comments-' + sectionId);
    try {
        const snap = await db.collection('narratives').doc(NARRATIVE_ID)
            .collection('sections').doc(sectionId)
            .collection('comments')
            .orderBy('timestamp', 'asc').get();
        if (snap.empty) {
            container.innerHTML = '<p class="nv-feedback-empty">No feedback yet. Be the first.</p>';
            return;
        }
        container.innerHTML = snap.docs.map(doc => {
            const d = doc.data();
            return `
                <div class="nv-comment">
                    <div class="nv-comment__avatar">${getInitials(d.name)}</div>
                    <div class="nv-comment__body">
                        <div class="nv-comment__header">
                            <span class="nv-comment__name">${d.name}</span>
                            <span class="nv-comment__time">${timeAgo(d.timestamp)}</span>
                        </div>
                        <p class="nv-comment__text">${d.comment}</p>
                    </div>
                </div>
            `;
        }).join('');
    } catch (e) {
        container.innerHTML = '<p class="nv-feedback-empty">Firestore not configured yet.</p>';
    }
}

    return `

            <div class="nv-section__inner">
                ${renderSectionLabel(section, index)}
                ${c.eyebrow ? `<p class="nv-eyebrow">${c.eyebrow}</p>` : ''}
                <h2 class="nv-section__h2">${c.h2}</h2>
                <div class="nv-table-wrap">
                    <table class="nv-table">
                        <thead><tr>${headersHtml}</tr></thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                </div>
                ${renderFeedbackBlock(section.id)}
            </div>
        </section>`;
}

function renderQuote(section, index) {
    const c = section.content;
    return `
        <section class="nv-section" id="section-${section.id}">
            <div class="nv-section__inner">
                ${renderSectionLabel(section, index)}
                <div class="nv-quote">
                    <span class="nv-quote__mark">"</span>
                    <p class="nv-quote__text">${c.quote}</p>
                    ${c.attribution ? `<p class="nv-quote__attribution">— ${c.attribution}</p>` : ''}
                </div>
                ${renderFeedbackBlock(section.id)}
            </div>
        </section>`;
}

function renderCtaBlock(section, index) {
    const c = section.content;
    return `
        <section class="nv-section" id="section-${section.id}">
            <div class="nv-section__inner">
                ${renderSectionLabel(section, index)}
                <div class="nv-cta-block">
                    ${c.eyebrow ? `<p class="nv-eyebrow">${c.eyebrow}</p>` : ''}
                    <h2 class="nv-cta-block__h2">${c.h2}</h2>
                    ${c.description ? `<p class="nv-cta-block__description">${c.description}</p>` : ''}
                    ${c.cta ? `<a href="${c.cta.url || '#'}" class="nv-btn nv-btn--primary">${c.cta.label}</a>` : ''}
                    ${c.footnote ? `<p class="nv-cta-block__footnote">${c.footnote}</p>` : ''}
                </div>
                ${renderFeedbackBlock(section.id)}
            </div>
        </section>`;
}

const RENDERERS = { 'hero': renderHero, 'section': renderSection, 'feature-list': renderFeatureList, 'quote': renderQuote, 'table': renderTable, 'cta-block': renderCtaBlock };

function renderNav(data) {
    const items = data.sections.map((s, i) => `
        <a class="nv-nav-item" href="#section-${s.id}" id="nav-${s.id}">
            <span class="nv-nav-item__number">${String(i + 1).padStart(2, '0')}</span>
            <span class="nv-nav-item__label">${s.label || 'Section'}</span>
        </a>`).join('');
    return `
        <aside class="nv-sidebar">
            <div class="nv-sidebar__header">${MOOOD_LOGO}</div>
            <div class="nv-sidebar__sections-label">Sections</div>
            <nav class="nv-sidebar__nav">${items}</nav>
            <div class="nv-sidebar__footer">
                <span class="nv-status-badge pending">${data.meta.status || 'Pending Approval'}</span>
            </div>
        </aside>`;
}

function renderMain(data) {
    const sectionsHtml = data.sections.map((section, i) => {
        const renderer = RENDERERS[section.type];
        return renderer ? renderer(section, i) : `<section class="nv-section" id="section-${section.id}"><p>Unknown type: ${section.type}</p></section>`;
    }).join('');
    return `
        <div class="nv-main">
            <div class="nv-topbar">
                <div class="nv-topbar__info">
                    <span class="nv-topbar__client">${data.meta.project}</span>
                    <span class="nv-topbar__sep">·</span>
                    <span class="nv-topbar__segment">Narrative</span>
                    <span class="nv-topbar__sep">·</span>
                    <span class="nv-topbar__segment">${data.meta.page || 'Homepage'}</span>
                    <span class="nv-topbar__sep">·</span>
                    <span class="nv-topbar__meta">${data.meta.date}</span>
                    <span class="nv-topbar__sep">·</span>
                    <span class="nv-topbar__meta">${data.meta.version}</span>
                </div>
                <div class="nv-topbar__actions">
                    <button class="nv-btn nv-btn--ghost" onclick="window.print()">Print / PDF</button>
                    <a href="mailto:?subject=Narrative+Review+%E2%80%94+${encodeURIComponent(data.meta.project)}&body=Please+review+the+narrative+at+this+link." class="nv-btn nv-btn--primary">Share via Email</a>
                </div>
            </div>
            ${sectionsHtml}
        </div>`;
}

function initScrollSpy(sections) {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const id = entry.target.id.replace('section-', '');
                document.querySelectorAll('.nv-nav-item').forEach(el => el.classList.remove('active'));
                const nav = document.getElementById('nav-' + id);
                if (nav) nav.classList.add('active');
            }
        });
    }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });
    sections.forEach(s => {
        const el = document.getElementById('section-' + s.id);
        if (el) observer.observe(el);
    });
}

// ── INIT ─────────────────────────────────────────────
(function init() {
    const data = NARRATIVE_DATA;
    document.title = `${data.meta.project} — Narrative Review`;
    document.getElementById('app').innerHTML = renderNav(data) + renderMain(data);
    initScrollSpy(data.sections);
})();
</script>
</body>
</html>
