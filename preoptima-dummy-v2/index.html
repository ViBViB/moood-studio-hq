const NARRATIVE_ID = "preoptima-homepage-v2";

// ── HELPERS ─────────────────────────────────────────
function getInitials(name) { return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }
function timeAgo(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function showStatus(msg, isError = false) {
    const el = document.getElementById('db-status');
    el.textContent = msg;
    el.className = 'nv-db-status visible' + (isError ? ' error' : '');
    setTimeout(() => el.className = 'nv-db-status', 2500);
}

// ── COMMENTING SYSTEM ────────────────────────────────
function renderFeedbackBlock(sectionId) {
    return `
        <button class="nv-feedback-toggle" onclick="toggleFeedback('${sectionId}')">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 1H2C1.45 1 1 1.45 1 2v9c0 .55.45 1 1 1h2v3l3-3h7c.55 0 1-.45 1-1V2c0-.55-.45-1-1-1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
            Leave feedback
        </button>
        <div class="nv-feedback-panel" id="panel-${sectionId}">
            <div class="nv-feedback-form">
                <div class="nv-feedback-form-row">
                    <input type="text" id="name-${sectionId}" placeholder="Your name" maxlength="60">
                    <button class="nv-feedback-submit" onclick="submitComment('${sectionId}')">Send</button>
                </div>
                <textarea id="comment-${sectionId}" placeholder="Your feedback on this section..."></textarea>
            </div>
            <div class="nv-comments-list" id="comments-${sectionId}"></div>
        </div>`;
}

function toggleFeedback(sectionId) {
    const panel = document.getElementById('panel-' + sectionId);
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) { loadComments(sectionId); }
}

async function submitComment(sectionId) {
    const nameEl = document.getElementById('name-' + sectionId);
    const commentEl = document.getElementById('comment-' + sectionId);
    const btn = document.querySelector(`#panel-${sectionId} .nv-feedback-submit`);
    const name = nameEl.value.trim();
    const comment = commentEl.value.trim();
    if (!name || !comment) { showStatus('Please fill in both fields.', true); return; }
    btn.disabled = true;
    try {
        await db.collection('narratives').doc(NARRATIVE_ID).collection('sections').doc(sectionId).collection('comments').add({ name, comment, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        commentEl.value = '';
        btn.disabled = false;
        showStatus('Feedback sent ✓');
        loadComments(sectionId);
    } catch (e) { btn.disabled = false; showStatus('Database Error', true); }
}

async function loadComments(sectionId) {
    const container = document.getElementById('comments-' + sectionId);
    try {
        const snap = await db.collection('narratives').doc(NARRATIVE_ID).collection('sections').doc(sectionId).collection('comments').orderBy('timestamp', 'asc').get();
        if (snap.empty) { container.innerHTML = '<p class="nv-feedback-empty">No feedback yet.</p>'; return; }
        container.innerHTML = snap.docs.map(doc => {
            const d = doc.data();
            return `<div class="nv-comment"><div class="nv-comment__avatar">${getInitials(d.name)}</div><div class="nv-comment__body"><div class="nv-comment__header"><span class="nv-comment__name">${d.name}</span><span class="nv-comment__time">${timeAgo(d.timestamp)}</span></div><p class="nv-comment__text">${d.comment}</p></div></div>`;
        }).join('');
    } catch (e) { container.innerHTML = '<p class="nv-feedback-empty">Error loading feedback.</p>'; }
}

function renderSection(section, index, isGlobal = false) {
    const c = section.content;
    const sectionId = section.id || (isGlobal ? (index === 0 ? 'header' : 'footer') : section.id);
    let html = `<section class="nv-section ${isGlobal ? 'nv-section--global' : ''}" id="section-${sectionId}" data-section="${sectionId}">`;
    html += `<span class="nv-section-label">${isGlobal ? section.label : `Block ${index + 1} — ${section.id.replace(/_/g, ' ')}`}</span>`;
    
    if (isGlobal) {
        if (c.primary) html += `<div class="nv-global-row"><h3>Primary :</h3><div class="nv-global-content">${c.primary}</div></div>`;
        if (c.secondary) html += `<div class="nv-global-row"><h3>Secondary:</h3><div class="nv-global-content">${c.secondary}</div></div>`;
        if (c.cta) {
            const ctas = Array.isArray(c.cta) ? c.cta : [c.cta];
            html += `<div class="nv-global-row"><h3>CTA:</h3><div class="nv-cta-group">${ctas.map(cta => `<div class="nv-cta">${cta}</div>`).join('')}</div></div>`;
        }
        if (sectionId === 'footer' && c.legal) html += `<div class="nv-global-row"><h3>Legal:</h3><div class="nv-global-content">${c.legal}</div></div>`;
        if (sectionId === 'footer' && c.copyright) html += `<div class="nv-global-row"><h3>Copyright:</h3><div class="nv-global-content">${c.copyright}</div></div>`;
    } else {
        if (c.headline || c.h1 || c.h2) html += `<h2 class="nv-headline">${c.headline || c.h1 || c.h2}</h2>`;
        if (c.subheadline || c.h3) html += `<h3 class="nv-subheadline">${c.subheadline || c.h3}</h3>`;
        
        if (Array.isArray(c.p)) { c.p.forEach(text => html += `<p class="nv-body">${text}</p>`); }
        else if (c.p) { html += `<p class="nv-body">${c.p}</p>`; }

        if (c.items) {
            c.items.forEach((item, i) => {
                html += `<div class="nv-block"><h3 class="nv-block-title">${item.title}</h3><div class="nv-block-body">${item.description || ''}</div></div>`;
            });
        }

        if (c.headers) {
            html += `<div class="nv-table-container"><table class="nv-table"><thead><tr>${c.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${c.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
        }

        if (c.quote) {
            html += `<div class="nv-quote">${c.quote}</div>`;
            if (c.attribution) html += `<div class="nv-attribution">${c.attribution}</div>`;
        }
        
        if (c.cta) {
             const ctas = Array.isArray(c.cta) ? c.cta : [c.cta];
             html += `<div class="nv-cta-group">${ctas.map(cta => `<div class="nv-cta">${cta}</div>`).join('')}</div>`;
        }
    }

    html += renderFeedbackBlock(sectionId);
    html += `</section>`;
    return html;
}

(function init() {
    const data = NARRATIVE_DATA;
    const nav = data.sections.map((s, i) => `<a class="nv-nav-item" href="#section-${s.id}" data-nav="${s.id}">Section ${i + 1}</a>`).join("");
    
    document.title = `${data.meta.project} — Narrative Review V2`;

    const appHtml = `
        <div class="nv-sidebar">
            <div class="nv-sidebar__header">${MOOOD_LOGO}</div>
            <div class="nv-sidebar__nav">
                ${data.header ? `<a class="nv-nav-item nv-nav-item--global" href="#section-header" data-nav="header">NAVIGATION</a>` : ''}
                ${nav}
                ${data.footer ? `<a class="nv-nav-item nv-nav-item--global" href="#section-footer" data-nav="footer">FOOTER</a>` : ''}
            </div>
        </div>
        <div class="nv-main">
            <div class="nv-topbar">
                <div class="nv-topbar__meta">
                    <span class="nv-topbar__project">${data.meta.project}</span>
                    <div class="nv-topbar__divider"></div>
                    <span>${data.meta.page}</span>
                    <div class="nv-topbar__divider"></div>
                    <span>${data.meta.status || 'Diagnostic'}</span>
                    <div class="nv-topbar__divider"></div>
                    <span>${data.meta.version}</span>
                </div>
                <div class="nv-topbar__actions">
                    <a href="#" class="nv-btn nv-btn--outline" onclick="window.print(); return false;">Print PDF</a>
                </div>
            </div>
            <div style="padding-top: 60px;">
                ${data.header ? renderSection({...data.header, id: 'header', label: 'NAVIGATION'}, 0, true) : ''}
                ${data.sections.map((s, i) => renderSection(s, i)).join("")}
                ${data.footer ? renderSection({...data.footer, id: 'footer', label: 'FOOTER'}, 0, true) : ''}
            </div>
        </div>`;

    document.getElementById('app').innerHTML = appHtml;

    const sections = document.querySelectorAll('.nv-section');
    const navItems = document.querySelectorAll('.nv-nav-item');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const id = entry.target.dataset.section;
                navItems.forEach(nav => nav.classList.toggle('active', nav.dataset.nav === id));
            }
        });
    }, { threshold: 0.3, rootMargin: '0px 0px -50% 0px' });
    sections.forEach(s => observer.observe(s));
})();
</script>
