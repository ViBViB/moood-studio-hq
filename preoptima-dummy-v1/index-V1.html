<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root { 
            --black: #000; 
            --white: #fff; 
            --gray-50: #fcfcfc;
            --gray-100: #f3f3f3; 
            --gray-200: #eee; 
            --gray-300: #ddd; 
            --gray-500: #888; 
            --font-sans: 'Inter', sans-serif; 
            --sidebar-width: 250px; 
            --content-max: 800px; 
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-sans); background: var(--white); color: var(--black); line-height: 1.6; -webkit-font-smoothing: antialiased; }

        .nv-layout { display: flex; min-height: 100vh; }

        /* Sidebar Settings */
        .nv-sidebar { width: var(--sidebar-width); position: fixed; top: 0; left: 0; bottom: 0; background: var(--white); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; z-index: 1000; }
        .nv-sidebar__header { padding: 40px 30px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: center; align-items: center; }
        .nv-sidebar__logo { height: 40px; display: block; }
        .nv-sidebar__nav { flex: 1; overflow-y: auto; padding: 20px 0; }
        .nv-nav-item { padding: 12px 30px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gray-500); text-decoration: none; display: block; border-left: 3px solid transparent; transition: all 0.2s; }
        .nv-nav-item:hover { background: var(--gray-50); color: var(--black); }
        .nv-nav-item.active { background: var(--gray-50); color: var(--black); border-left-color: var(--black); font-weight: 700; }

        /* Main Content Container */
        .nv-main { margin-left: var(--sidebar-width); flex: 1; min-width: 0; padding-bottom: 150px; }
        .nv-topbar { height: 60px; border-bottom: 1px solid var(--gray-200); padding: 0 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); z-index: 500; }
        .nv-topbar__meta { font-size: 10px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 10px; }
        .nv-topbar__project { color: var(--black); font-weight: 700; }
        .nv-topbar__divider { width: 1px; height: 10px; background: var(--gray-300); }

        .nv-btn { height: 32px; padding: 0 16px; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 2px; cursor: pointer; display: inline-flex; align-items: center; border: 1px solid var(--black); transition: all 0.2s; text-decoration: none; }
        .nv-btn--primary { background: var(--black); color: var(--white); }
        .nv-btn--outline { background: transparent; color: var(--black); }

        /* Document Header */
        .nv-doc-header { padding: 80px 60px 40px; max-width: var(--content-max); margin: 0 auto; }
        .nv-doc-title { font-size: 42px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 40px; color: #111; }

        /* Meta Card (Diagnostic Box) */
        .nv-meta-card { background: var(--gray-50); border-radius: 12px; padding: 30px 40px; margin-bottom: 60px; border: 1px solid var(--gray-100); }
        .nv-meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .nv-meta-item { display: flex; flex-direction: column; gap: 4px; }
        .nv-meta-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-500); }
        .nv-meta-value { font-size: 14px; font-weight: 500; color: var(--black); }

        /* Section styles */
        .nv-section { padding: 40px 60px; max-width: var(--content-max); margin: 0 auto; scroll-margin-top: 80px; position: relative; }
        .nv-section::after { content: ''; display: block; height: 1px; background: var(--gray-100); margin-top: 60px; }
        .nv-section:last-of-type::after { display: none; }

        .nv-section-label { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 30px; display: block; }
        .nv-headline { font-size: 28px; font-weight: 700; line-height: 1.25; margin-bottom: 20px; letter-spacing: -0.02em; }
        .nv-subheadline, .nv-block-title { font-size: 20px; font-weight: 500; line-height: 1.4; margin-bottom: 20px; color: #333; text-transform: none; letter-spacing: normal; }
        .nv-body, .nv-block-body { font-size: 16px; line-height: 1.7; color: #444; margin-bottom: 25px; }
        .nv-cta { font-size: 15px; font-weight: 600; text-decoration: underline; color: var(--black); text-underline-offset: 4px; cursor: pointer; transition: opacity 0.2s; }
        .nv-cta:hover { opacity: 0.7; }

        /* Specialized Components */
        .nv-quote { font-style: italic; font-size: 22px; line-height: 1.4; color: var(--black); border-left: 3px solid var(--black); padding-left: 30px; margin: 40px 0 20px; }
        .nv-attribution { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-500); margin-bottom: 40px; padding-left: 33px; }

        .nv-table-container { margin: 40px 0; border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden; }
        .nv-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        .nv-table th { padding: 15px 20px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
        .nv-table td { padding: 15px 20px; border-bottom: 1px solid var(--gray-100); }
        .nv-table tr:last-child td { border-bottom: none; }

function renderSection(section, index) {
    const c = section.content;
    let html = `<section class="nv-section" id="section-${section.id}" data-section="${section.id}">`;
    
    // Section Label
    html += `<span class="nv-section-label">Section ${index + 1}: ${section.label.replace(/_/g, ' ')}</span>`;
    
    // Headline (H1/H2)
    const headline = c.headline || c.h1 || c.h2;
    if (headline) html += `<h2 class="nv-headline">${headline}</h2>`;
    
    // Subheadline (H3)
    const subheadline = c.subheadline || c.h3;
    if (subheadline) html += `<h3 class="nv-subheadline">${subheadline}</h3>`;
    
    // Body (Multiple P or single)
    if (Array.isArray(c.p)) {
        c.p.forEach(text => {
            const cleanText = text.includes('Body — Block') ? text.split(':')[1].trim() : text;
            html += `<p class="nv-body">${cleanText}</p>`;
        });
    } else if (c.p) {
        html += `<p class="nv-body">${c.p}</p>`;
    }

    // Specialized Logic: Linear Blocks
    if (c.items) {
        c.items.forEach((item, i) => {
            const h = item.title;
            const b = item.description && item.description.includes('Body:') ? item.description.split('Body:')[1].trim() : (item.description || '');
            html += `<div class="nv-block"><h3 class="nv-block-title">${h}</h3><div class="nv-block-body">${b}</div></div>`;
        });
    }

    // Specialized Logic: Table
    if (c.headers) {
        html += `<div class="nv-table-container"><table class="nv-table"><thead><tr>`;
        c.headers.forEach(h => html += `<th>${h}</th>`);
        html += `</tr></thead><tbody>`;
        c.rows.forEach(row => {
            html += `<tr>`;
            row.forEach(cell => html += `<td>${cell}</td>`);
            html += `</tr>`;
        });
        html += `</tbody></table></div>`;
    }

    // Specialized Logic: Quote
    if (c.quote) {
        html += `<div class="nv-quote">${c.quote}</div>`;
        if (c.attribution) html += `<div class="nv-attribution">${c.attribution}</div>`;
    }
    
    // CTA
    if (c.cta) html += `<div class="nv-cta">${c.cta}</div>`;

    html += `</section>`;
    return html;
}

    const observer = new IntersectionObserver((entries) => {

                const id = entry.target.dataset.section;
                navItems.forEach(nav => nav.classList.toggle('active', nav.dataset.nav === id));

    }, { threshold: 0.3, rootMargin: '0px 0px -50% 0px' });
    sections.forEach(s => observer.observe(s));
