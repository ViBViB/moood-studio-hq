<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Preoptima — Identity Exploration</title>
<style>
  :root {
    --font: 'Helvetica Now Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --ink: #0A0A0A;
    --paper: #FFFFFF;
    --text: #111111;
    --muted: rgba(0, 0, 0, 0.54);
    --dim: rgba(0, 0, 0, 0.34);
    --faint: rgba(0, 0, 0, 0.16);
    --hair: rgba(0, 0, 0, 0.11);
    --card: #F6F5F3;
    --measure: 66ch;
    --content-max: 1440px;
    --pad: clamp(1.5rem, 5vw, 5rem);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--text);
    font-family: var(--font);
    font-size: 17px;
    line-height: 1.62;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .eyebrow { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; font-weight: 500; margin: 0; }

  /* ── FIXED MASTHEAD (logo only) ───────────────────── */
  .mast {
    position: fixed; top: clamp(1.3rem, 3vw, 2.2rem); left: clamp(1.3rem, 3vw, 2.2rem);
    z-index: 40; color: var(--ink);
  }
  .mast .wordmark svg { height: 60px; width: auto; display: block; }
  .mast .wordmark svg path { fill: currentColor; }

  /* ── DECK / SLIDES ─────────────────────────────────── */
  .deck { }
  .slide {
    display: none;
    min-height: 100vh;
    padding: clamp(6.5rem, 11vw, 9rem) var(--pad) clamp(8rem, 12vw, 10rem);
  }
  .slide.active { display: flex; flex-direction: column; justify-content: center; }
  .slide-inner { max-width: var(--content-max); margin: 0 auto; width: 100%; }

  /* Intro slide — title + standfirst only */
  .intro-inner { text-align: center; }
  .intro-inner .eyebrow {
    color: var(--muted); margin: 0 auto clamp(1.2rem, 2.4vw, 1.6rem);
  }
  .intro-inner h1 {
    font-size: clamp(2.6rem, 7vw, 5.4rem);
    line-height: 0.98; letter-spacing: -0.034em; font-weight: 500;
    margin: 0 auto; text-wrap: balance; max-width: 20ch;
  }
  .intro-inner p:not(.eyebrow) {
    margin: clamp(1.6rem, 3vw, 2.3rem) auto 0;
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    line-height: 1.5; letter-spacing: -0.012em; color: var(--muted); font-weight: 400;
    max-width: 52ch;
  }

  /* Alt slide head */
  .slide-head { max-width: 72ch; margin-bottom: clamp(2.2rem, 4.5vw, 3.2rem); }
  .alt-no { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; color: var(--dim); font-variant-numeric: tabular-nums; }
  h2 {
    font-size: clamp(1.9rem, 4.2vw, 3.1rem);
    line-height: 1.04; letter-spacing: -0.03em; font-weight: 500;
    margin: 0.6rem 0 0; text-wrap: balance;
  }
  .alt-lede {
    margin: 1rem 0 0; font-size: clamp(1.1rem, 2vw, 1.3rem); line-height: 1.45;
    letter-spacing: -0.012em; color: var(--muted); font-weight: 400; max-width: 56ch;
  }

  /* Logo stage — full width of the deck column */
  .stage {
    width: 100%; background: var(--card); border-radius: 8px;
    padding: clamp(3rem, 8vw, 6rem) clamp(2rem, 6vw, 4rem);
    display: flex; align-items: center; justify-content: center;
    min-height: clamp(260px, 34vw, 460px);
    margin-bottom: clamp(2.2rem, 4.5vw, 3.2rem);
  }
  .stage svg { width: 100%; height: auto; max-width: 980px; display: block; }
  .stage svg path { fill: var(--ink); }
  .stage.square svg { max-width: 420px; }

  .alt-body { max-width: 68ch; }
  .alt-body p { margin: 0; color: var(--muted); font-size: 16.5px; }

  .adjectives { margin-top: 1.8rem; padding-top: 1.5rem; border-top: 1px solid var(--hair); max-width: 68ch; }
  .adjectives .lead { display: block; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; color: var(--dim); margin-bottom: 0.65rem; }
  .adj-list { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .adj-list li { font-size: 13.5px; color: var(--text); background: var(--card); border-radius: 999px; padding: 0.42rem 0.95rem; }

  /* ── FLOATING NAV DOCK ─────────────────────────────── */
  .dock {
    position: fixed; left: 50%; bottom: clamp(1.2rem, 3vw, 2rem); transform: translateX(-50%);
    z-index: 50; display: flex; flex-wrap: nowrap; justify-content: flex-start; gap: 0.35rem;
    background: rgba(255, 255, 255, 0.88); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    border: 1px solid var(--hair); border-radius: 999px;
    padding: 0.4rem; box-shadow: 0 14px 44px rgba(0, 0, 0, 0.12);
    max-width: calc(100vw - 2rem);
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .dock::-webkit-scrollbar { display: none; }
  .dockbtn {
    flex: 0 0 auto;
    font-family: var(--font); font-size: 13px; letter-spacing: -0.005em; font-weight: 500;
    color: var(--muted); background: transparent; border: none; border-radius: 999px;
    padding: 0.58rem 1.05rem; cursor: pointer; white-space: nowrap;
    transition: background 0.24s var(--ease), color 0.24s var(--ease);
  }
  .dockbtn .n { font-variant-numeric: tabular-nums; color: var(--dim); margin-right: 0.5em; }
  .dockbtn:hover { color: var(--text); }
  .dockbtn.active { background: var(--ink); color: #fff; }
  .dockbtn.active .n { color: rgba(255, 255, 255, 0.5); }
  .dockbtn:focus-visible { outline: 2px solid #000; outline-offset: 2px; }

  @media (prefers-reduced-motion: no-preference) {
    .rise { opacity: 0; transform: translateY(14px); animation: rise 0.7s var(--ease) forwards; }
    @keyframes rise { to { opacity: 1; transform: none; } }
  }

  @media (max-width: 620px) {
    .slide { padding-bottom: clamp(9rem, 22vw, 11rem); }
  }
</style>
</head>

  const SLIDES = [{ id: 'intro', name: 'Intro' }, ...ALTS.map(a => ({ id: a.id, name: a.name }))];

  const deck = document.getElementById('deck');
  const dock = document.getElementById('dock');

  // Intro slide
  const introSlide = document.createElement('section');
  introSlide.className = 'slide active';
  introSlide.id = 'slide-intro';
  introSlide.innerHTML = `
    <div class="slide-inner intro-inner">
      <p class="eyebrow">Preoptima — Brand exploration</p>
      <h1>Four directions for the mark.</h1>
      <p>Four different ideas for what the Preoptima mark could be — each built from a different read of the brief, not a different style exercise. Nothing here is final. Pick the one whose thinking feels most like Preoptima, and we take it further from there.</p>
    </div>
  `;
  deck.appendChild(introSlide);

  // Alt slides
  ALTS.forEach((alt, i) => {
    const slide = document.createElement('section');
    slide.className = 'slide';
    slide.id = 'slide-' + alt.id;
    slide.innerHTML = `
      <div class="slide-inner">
        <div class="slide-head">
          <span class="alt-no">0${i + 1} / 0${ALTS.length}</span>
          <h2>${alt.name}</h2>
          <p class="alt-lede">${alt.lede}</p>
        </div>
        <div class="stage${alt.square ? ' square' : ''}">${alt.svg}</div>
        <div class="alt-body"><p>${alt.body}</p></div>
        <div class="adjectives">
          <span class="lead">Adjectives:</span>
          <ul class="adj-list">${alt.adjectives.map(a => `<li>${a}</li>`).join('')}</ul>
        </div>
      </div>
    `;
    deck.appendChild(slide);
  });

  // Dock nav
  SLIDES.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'dockbtn' + (i === 0 ? ' active' : '');
    btn.type = 'button';
    btn.dataset.id = s.id;
    btn.innerHTML = s.id === 'intro' ? 'Intro' : `<span class="n">0${i}</span>${s.name}`;
    btn.addEventListener('click', () => show(s.id));
    dock.appendChild(btn);
  });

  function show(id) {
    document.querySelectorAll('.dockbtn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
    document.querySelectorAll('.slide').forEach(p => p.classList.toggle('active', p.id === 'slide-' + id));
    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  }

  const tpl = document.getElementById('logo');
  document.querySelectorAll('[data-logo]').forEach(function (slot) {
    slot.appendChild(tpl.content.cloneNode(true));
  });
</script>
