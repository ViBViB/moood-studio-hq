<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ PROJECT_NAME }} — Narrative Blueprint</title>
    <meta name="description" content="Technical narrative documentation for {{ PROJECT_NAME }} by Moood.Studio">
    <meta name="robots" content="noindex, nofollow">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        :root { --black: #000; --white: #fff; --gray-100: #f8f8f8; --gray-200: #eee; --gray-300: #ddd; --gray-500: #777; --font-sans: 'Inter', sans-serif; --sidebar-width: 250px; --content-max: 900px; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-sans); background: var(--white); color: var(--black); line-height: 1.6; -webkit-font-smoothing: antialiased; }
        .nv-layout { display: flex; min-height: 100vh; }
        .nv-sidebar { width: var(--sidebar-width); position: fixed; top: 0; left: 0; bottom: 0; background: var(--white); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; z-index: 1000; }
        .nv-sidebar__header { padding: 40px 30px; border-bottom: 1px solid var(--gray-200); }
        .nv-sidebar__logo { height: 40px; display: block; }
        .nv-sidebar__nav { flex: 1; overflow-y: auto; padding: 20px 0; }
        .nv-nav-item { padding: 12px 30px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gray-500); text-decoration: none; display: block; border-left: 3px solid transparent; transition: all 0.2s; }
        .nv-nav-item:hover { background: var(--gray-100); color: var(--black); }
        .nv-nav-item.active { background: var(--gray-100); color: var(--black); border-left-color: var(--black); font-weight: 700; }
        .nv-main { margin-left: var(--sidebar-width); flex: 1; min-width: 0; padding-bottom: 100px; }
        .nv-topbar { height: 60px; border-bottom: 1px solid var(--gray-200); padding: 0 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 500; }
        .nv-topbar__meta { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 10px; }
        .nv-topbar__project { color: var(--black); font-weight: 700; }
        .nv-topbar__divider { width: 1px; height: 12px; background: var(--gray-300); }
        .nv-btn { height: 32px; padding: 0 16px; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 2px; cursor: pointer; display: inline-flex; align-items: center; border: 1px solid var(--black); transition: all 0.2s; }
        .nv-btn--primary { background: var(--black); color: var(--white); }
        .nv-btn--outline { background: transparent; color: var(--black); margin-right: 8px; }
        .nv-section { padding: 80px 60px 40px; max-width: var(--content-max); margin: 0 auto; scroll-margin-top: 60px; }
        .nv-section__id { font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 30px; display: flex; align-items: center; gap: 20px; }
        .nv-section__id::after { content: ''; flex: 1; height: 1px; background: var(--gray-300); }
        .nv-atomic-list { list-style: none; padding-left: 20px; margin-bottom: 20px; }
        .nv-atomic-item { margin-bottom: 12px; font-size: 15px; display: flex; align-items: flex-start; }
        .nv-atomic-label { font-weight: 700; margin-right: 8px; white-space: nowrap; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--gray-500); padding-top: 3px; width: 120px; }
        .nv-atomic-value { color: #333; flex: 1; }
        .nv-block-header { font-size: 16px; font-weight: 700; margin: 40px 0 20px; text-transform: uppercase; letter-spacing: 0.05em; border-left: 3px solid var(--black); padding-left: 15px; }
        .nv-block { margin-bottom: 60px; }
        .nv-table-container { margin: 30px 20px 40px; overflow-x: auto; border: 1px solid var(--gray-200); border-radius: 4px; }
        .nv-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        .nv-table th { padding: 15px 15px; border-bottom: 1px solid var(--gray-200); font-weight: 700; text-transform: uppercase; background: var(--gray-100); }
        .nv-table td { padding: 15px 15px; border-bottom: 1px solid var(--gray-100); }
        .nv-feedback-toggle { margin-top: 20px; padding: 6px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--gray-500); border: 1px solid var(--gray-200); background: transparent; cursor: pointer; }
        .nv-feedback-panel { display: none; margin-top: 15px; }
        .nv-feedback-panel.open { display: block; }
        .nv-feedback-form { padding: 20px; background: var(--gray-100); display: flex; flex-direction: column; gap: 10px; }
        .nv-feedback-form input, .nv-feedback-form textarea { padding: 12px; font-family: inherit; font-size: 13px; border: 1px solid var(--gray-300); background: var(--white); }
        .nv-comment { padding: 15px 20px; border-bottom: 1px solid var(--gray-200); font-size: 13px; }
        .nv-comment__name { font-weight: 700; }
        @media print { .nv-sidebar, .nv-topbar, .nv-feedback-toggle { display: none !important; } .nv-main { margin-left: 0 !important; } .nv-section { padding: 40px 0 !important; page-break-inside: avoid; } }
    </style>

function renderAtomicItem(label, value) {
    if (!value) return '';
    return `<li class="nv-atomic-item"><span class="nv-atomic-label">${label}</span><span class="nv-atomic-value">${value}</span></li>`;
}

function renderSection(section) {
    const c = section.content;
    let listContent = '';
    listContent += renderAtomicItem('Headline', c.headline || c.h1 || c.h2);
    listContent += renderAtomicItem('Sub-headline', c.subheadline || c.h3);
    if (Array.isArray(c.p)) {
        c.p.forEach(text => {
            const label = text.includes('Body — Block') ? text.split(':')[0] : 'Body';
            const value = text.includes('Body — Block') ? text.split(':')[1].trim() : text;
            listContent += renderAtomicItem(label, value);
        });
    } else if (c.p) { listContent += renderAtomicItem('Body', c.p); }
    listContent += renderAtomicItem('CTA', c.cta);
    
    let statsContent = '';
    if (c.stats) {
        statsContent = c.stats.map(s => `<div class="nv-block"><div class="nv-block-header">${s.label}</div><ul class="nv-atomic-list">${renderAtomicItem('Headline', s.h3)}${renderAtomicItem('Body', s.p)}${renderAtomicItem('Source', s.source)}</ul></div>`).join("");
    }
    
    let itemsContent = '';
    if (c.items) {
        itemsContent = c.items.map((item, i) => {
            const isStep = item.title.includes('Step');
            const label = isStep ? item.title : `Block ${String(i+1).padStart(2, '0')}`;
            const headline = item.description && item.description.includes('Headline:') ? item.description.split('Headline:')[1].split('\n')[0].trim() : item.title;
            const body = item.description && item.description.includes('Body:') ? item.description.split('Body:')[1].trim() : (item.description || '');
            return `<div class="nv-block"><div class="nv-block-header">${label}</div><ul class="nv-atomic-list">${renderAtomicItem('Headline', headline)}${renderAtomicItem('Body', body)}${renderAtomicItem('Icon_Intent', item.icon_intent)}</ul></div>`;
        }).join("");
    }

    let tableContent = '';
    if (c.headers) {
        const headers = c.headers.map(h => `<th>${h}</th>`).join("");
        const rows = c.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join("")}</tr>`).join("");
        tableContent = `<div class="nv-table-container"><table class="nv-table"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    if (c.quote) { listContent += renderAtomicItem('Quote', c.quote); listContent += renderAtomicItem('Attribution', c.attribution); }

    return `<section class="nv-section" id="section-${section.id}" data-section="${section.id}"><div class="nv-section__id">SECTION: ${section.label}</div><ul class="nv-atomic-list">${listContent}</ul>${statsContent}${itemsContent}${tableContent}</section>`;
}

(function init() {
    const data = NARRATIVE_DATA;
    const nav = data.sections.map(s => `<a class="nv-nav-item" href="#section-${s.id}" data-nav="${s.id}">${s.label}</a>`).join("");
    document.getElementById('app').innerHTML = `<div class="nv-sidebar"><div class="nv-sidebar__header">${MOOOD_LOGO}</div><div class="nv-sidebar__nav">${nav}</div></div><div class="nv-main"><div class="nv-topbar"><div class="nv-topbar__meta"><span class="nv-topbar__project">${data.meta.project}</span><div class="nv-topbar__divider"></div><span>${data.meta.page}</span><div class="nv-topbar__divider"></div><span>${data.meta.version}</span></div><div class="nv-topbar__actions"><button class="nv-btn nv-btn--outline" onclick="window.print()">Print PDF</button><button class="nv-btn nv-btn--primary">Approve Narrative</button></div></div>${data.sections.map(s => renderSection(s)).join("")}</div>`;

    // ── NAVIGATION OBSERVER ───────────────────────────
    const sections = document.querySelectorAll('.nv-section');
    const navItems = document.querySelectorAll('.nv-nav-item');
    const options = { threshold: 0.3, rootMargin: '0px 0px -50% 0px' };
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const id = entry.target.dataset.section;
                navItems.forEach(nav => {
                    nav.classList.toggle('active', nav.dataset.nav === id);
                });
            }
        });
    }, options);
    sections.forEach(s => observer.observe(s));
})();
</script>
