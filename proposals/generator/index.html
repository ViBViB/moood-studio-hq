<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal Generator — Moood.Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#111;--gray:#f5f5f5;--border:#e0e0e0;--accent:#111;--radius:2px}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#111;min-height:100vh}
.gen-header{background:transparent;color:#111;padding:20px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.gen-header-left{display:flex;align-items:center;gap:16px}
.gen-logo img{height:60px;width:auto;display:block}
.gen-page-title{font-size:clamp(32px,4vw,42px);font-weight:400;color:#111;letter-spacing:-0.02em;margin-bottom:32px}
.gen-body{max-width:1000px;margin:0 auto;padding:40px 24px}
.section{margin-bottom:60px}
.section-header{padding:20px 24px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.section-number{width:44px;height:44px;background:#111;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:500;flex-shrink:0}
.section-label{font-size:29px;font-weight:500;flex:1}
.section-body{padding:24px}
.field-group{display:grid;gap:16px;margin-bottom:16px}
.field-group.cols-2{grid-template-columns:1fr 1fr}
.field-group.cols-3{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column}
.field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#BCBCBC;display:flex;align-items:center;gap:12px;margin-bottom:10px}
input, select, textarea{width:100%;padding:16px 20px;border:none;border-radius:8px;font-size:15px;font-family:inherit;background:#F7F7F7;color:#000;outline:none;transition:all 0.3s ease}
select{appearance:none;-webkit-appearance:none;background-image:url('data:image/svg+xml;utf8,<svg width=\"12\" height=\"8\" viewBox=\"0 0 12 8\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M1 1.5L6 6.5L11 1.5\" stroke=\"black\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>');background-repeat:no-repeat;background-position:right 24px center}
input:focus, select:focus, textarea:focus{box-shadow:inset 0 0 0 1px #111}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.toggle-group{display:flex;gap:8px}
.toggle-btn{padding:8px 16px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;border-radius:var(--radius);transition:all .2s;color:#999}
.toggle-btn.active{background:#111;color:#fff;border-color:#111}
.dynamic-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.dynamic-row{display:grid;gap:8px;align-items:center}
.dynamic-row.pages-row{grid-template-columns:1fr 160px 32px}
.dynamic-row.diagnosis-row{grid-template-columns:180px 1fr 32px}
.dynamic-row.roadmap-step-row{grid-template-columns:1fr 32px}
.dynamic-row.investment-row{grid-template-columns:1fr 120px 32px}
.dynamic-row.branding-row{grid-template-columns:160px 1fr 32px}
.dynamic-row.additional-row{grid-template-columns:1fr 32px}
.btn-remove{width:32px;height:32px;border:1px solid #eee;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#ccc;border-radius:var(--radius);font-size:16px;line-height:1;flex-shrink:0;transition:all .2s}
.btn-remove:hover{border-color:#f00;color:#f00}
.btn-add{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 14px;border:1px dashed #ccc;background:#fff;cursor:pointer;color:#999;border-radius:var(--radius);transition:all .2s;margin-top:4px}
.btn-add:hover{border-color:#111;color:#111}
.roadmap-phase{padding:16px;margin-bottom:8px;border-radius:var(--radius)}
.subsection-label{font-size:18px;font-weight:500;color:#999;margin-bottom:12px;padding-bottom:16px}
.roadmap-phase-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.roadmap-phase-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#666}
.platform-toggle{margin-bottom:16px}
.platform-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.platform-card-editor{border:1px solid var(--border);padding:16px;border-radius:var(--radius)}
.platform-card-editor h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:12px}
.spec-row{display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;margin-bottom:8px;align-items:center}
.gen-header-right{display:flex;align-items:center;gap:24px}
.gen-header-status{font-size:12px;font-weight:500;color:#999}
.btn-generate{padding:14px 40px;background:#111;color:#fff;border:none;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;border-radius:var(--radius);transition:all .2s}
.btn-generate:hover{background:#333}
.btn-generate:disabled{background:#999;cursor:wait}
.result-box{background:#f0f0f0;border:1px solid var(--border);padding:20px 24px;margin-top:24px;display:none}
.result-box.show{display:block}
.result-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:8px}
.result-url{font-size:14px;font-weight:600;color:#111;word-break:break-all;margin-bottom:12px}
.result-actions{display:flex;gap:8px}
.btn-copy,.btn-open{padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border:1px solid #111;cursor:pointer;border-radius:var(--radius);background:#fff;transition:all .2s}
.btn-copy:hover,.btn-open:hover{background:#111;color:#fff}
.divider{height:1px;background:var(--border);margin:20px 0}
.subsection-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.tech-check{display:flex;align-items:center;gap:8px;font-size:13px;color:#333;cursor:pointer;padding:6px 0}
.tech-check input[type="checkbox"]{width:16px;height:16px;flex-shrink:0;accent-color:#111;cursor:pointer}
</style>
</head>
<body>

<header class="gen-header">
    <div class="gen-header-left">
        <div class="gen-logo">
            <img src="../../assets/images/moood-logo.svg" alt="Moood.Studio">
        </div>
    </div>
    <div class="gen-header-right">
        <div class="gen-header-status" id="footerStatus">Fill all required fields (*) then generate.</div>
        <button class="btn-generate" id="btnGenerate" onclick="generateProposal()">Generate Proposal →</button>
    </div>
</header>

<div class="gen-body">
    <h1 class="gen-page-title">Proposal Generator</h1>

    <!-- RESULT BOX (shown after generation) -->
    <div class="result-box" id="resultBox">
        <div class="result-label">Proposal ready</div>
        <div class="result-url" id="resultUrl"></div>
        <div class="result-actions">
            <button class="btn-copy" onclick="copyUrl()">Copy link</button>
            <button class="btn-open" onclick="openUrl()">Open proposal</button>
        </div>
    </div>

    <!-- 01 — CLIENT -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">1</div>
            <div>
                <div class="section-label">Client</div>
                            </div>
                    </div>
        <div class="section-body">
            <div class="field-group cols-2">
                <div class="field">
                    <label>Client name *</label>
                    <input type="text" id="clientName" placeholder="Client company name" required>
                </div>
                <div class="field">
                    <label>Project name *</label>
                    <input type="text" id="projectName" placeholder="Client — Project description" required>
                </div>
            </div>
            <div class="field-group cols-2">
                <div class="field">
                    <label>Project lead name</label>
                    <input type="text" id="leadName" placeholder="Jane Smith">
                </div>
                <div class="field">
                    <label>Project lead email</label>
                    <input type="email" id="clientEmail" placeholder="hello@client.com">
                </div>
            </div>
            <div class="field-group cols-2">
                <div class="field">
                    <label>Proposal date</label>
                    <input type="text" id="proposalDate" placeholder="April 2026">
                </div>
            <div class="field">
                <label>Proposal type label</label>
                <input type="text" id="proposalType" placeholder="Brand & Website Proposal" value="Brand & Website Proposal">
                            </div>
        </div>
    </div>

    <!-- 02 — PROJECT CONFIG -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">2</div>
            <div>
                <div class="section-label">Project Config</div>
                            </div>
                    </div>
        <div class="section-body">
            <div class="field-group cols-3">
                <div class="field">
                    <label>Project type</label>
                    <select id="projectType">
                        <option value="website">Website</option>
                        <option value="landing">Landing page</option>
                        <option value="blog">Blog</option>
                        <option value="pillar">Pillar page</option>
                        <option value="social">Social media</option>
                        <option value="comms">Communications</option>
                        <option value="branding">Branding only</option>
                    </select>
                </div>
                <div class="field">
                    <label>Tier</label>
                    <select id="projectTier">
                        <option value="small">Small (3–5 pages)</option>
                        <option value="medium">Medium (6–8 pages)</option>
                        <option value="large" selected>Large (9+ pages)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Scenario</label>
                    <select id="projectScenario">
                        <option value="A">A — Brand-Free</option>
                        <option value="B">B — Figma Fidelity</option>
                        <option value="C">C — Component-Locked</option>
                        <option value="D">D — Figma + Components</option>
                    </select>
                </div>
            </div>
            <div class="field-group cols-2">
                <div class="field">
                    <label>Narrative</label>
                    <div class="radio-group" style="display:flex;gap:24px;margin-top:10px;">
                        <label style="flex-direction:row;font-size:15px;color:#000;text-transform:none;letter-spacing:normal;font-weight:400;margin:0;"><input type="radio" name="narrative" value="false" checked style="width:auto;margin:0;"> Strategist writes</label>
                        <label style="flex-direction:row;font-size:15px;color:#000;text-transform:none;letter-spacing:normal;font-weight:400;margin:0;"><input type="radio" name="narrative" value="true" style="width:auto;margin:0;"> Client delivers copy</label>
                    </div>
                </div>
            </div>

            <div class="divider"></div>
                        <div class="dynamic-list" id="pagesList"></div>
            <button class="btn-add" onclick="addPage()">+ Add page</button>
        </div>
    </div>

    <!-- 03 — THE VISION -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">3</div>
            <div>
                <div class="section-label">The Vision</div>
                            </div>
                    </div>
        <div class="section-body">
                        <div class="field">
                <label>Vision body *</label>
                <textarea id="visionBody" rows="6" placeholder="What's the core ambition of this project? What should the client's digital presence feel, communicate, and achieve?&#10;&#10;Use [CLIENT_NAME] anywhere you want the client's name to appear automatically."></textarea>
                            </div>
            <div class="field" style="margin-top:12px">
                <label>Footer note (optional)</label>
                <input type="text" id="visionNote" placeholder="Optional footnote — e.g. 'This is a two-phase project: Brand Identity first, Website second.'">
                            </div>
        </div>
    </div>

    <!-- 04 — THE DIAGNOSIS -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">4</div>
            <div>
                <div class="section-label">The Diagnosis</div>
                            </div>
                    </div>
        <div class="section-body">
            <div class="dynamic-list" id="diagnosisList"></div>
            <button class="btn-add" onclick="addDiagnosis()">+ Add problem</button>
        </div>
    </div>

    <!-- 05 — THE ROADMAP -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">5</div>
            <div>
                <div class="section-label">The Roadmap</div>
                            </div>
                    </div>
        <div class="section-body">
            <div id="roadmapPhases"></div>
            <div style="display:flex; gap:8px;">
                <button class="btn-add" onclick="addPhase()">+ Add phase</button>
                <button class="btn-add" style="color:#999; border-color:transparent;" onclick="removeLastPhase()">- Remove phase</button>
            </div>

            <div class="divider"></div>
                        <div class="field" style="margin-bottom:12px">
                <div class="toggle-group">
                    <button class="toggle-btn active" data-group="platform" data-value="false" onclick="setToggle(this,togglePlatform)">No comparison</button>
                    <button class="toggle-btn" data-group="platform" data-value="true" onclick="setToggle(this,togglePlatform)">Show comparison</button>
                </div>
            </div>
            <div id="platformEditor" style="display:none">
                <div class="platform-cards">
                    <div class="platform-card-editor">
                        <h4>Current stack</h4>
                        <div class="field" style="margin-bottom:10px"><label>Name</label><input type="text" id="platformCurrentName" placeholder="HubSpot Starter"></div>
                        <div id="platformCurrentSpecs"></div>
                        <button class="btn-add" onclick="addSpec('currentSpecs')">+ Add spec</button>
                    </div>
                    <div class="platform-card-editor">
                        <h4>Proposed</h4>
                        <div class="field" style="margin-bottom:10px"><label>Name</label><input type="text" id="platformProposedName" placeholder="Framer"></div>
                        <div id="platformProposedSpecs"></div>
                        <button class="btn-add" onclick="addSpec('proposedSpecs')">+ Add spec</button>
                    </div>
                </div>
                <div class="field" style="margin-top:12px">
                    <label>Comparison note</label>
                    <input type="text" id="platformNote" placeholder="HubSpot stays as your CRM. Framer replaces HubSpot as the website layer.">
                </div>
            </div>
        </div>
    </div>

    <!-- 06 — THE DELIVERABLES -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">6</div>
            <div>
                <div class="section-label">The Deliverables</div>
            </div>
        </div>
        <div class="section-body">
            <div class="dynamic-list" id="brandingList"></div>
            <button class="btn-add" onclick="addBranding()">+ Add branding item</button>

            <div class="divider"></div>
            <div class="subsection-label">Technical scope</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 24px;margin-bottom:12px" id="techCheckboxes">
                <label class="tech-check"><input type="checkbox" value="WordPress development"> WordPress development</label>
                <label class="tech-check"><input type="checkbox" value="Headless CMS (Astro / Next.js / Nuxt)"> Headless CMS</label>
                <label class="tech-check"><input type="checkbox" value="Framer development"> Framer development</label>
                <label class="tech-check"><input type="checkbox" value="Shopify integration"> Shopify integration</label>
                <label class="tech-check"><input type="checkbox" value="HubSpot integration"> HubSpot integration</label>
                <label class="tech-check"><input type="checkbox" value="Webflow development"> Webflow development</label>
                <label class="tech-check"><input type="checkbox" value="Content migration"> Content migration</label>
                <label class="tech-check"><input type="checkbox" value="SEO setup & redirects"> SEO setup &amp; redirects</label>
                <label class="tech-check"><input type="checkbox" value="Analytics setup (GA4 / GTM)"> Analytics setup (GA4 / GTM)</label>
                <label class="tech-check"><input type="checkbox" value="Form &amp; CRM integration"> Form &amp; CRM integration</label>
                <label class="tech-check"><input type="checkbox" value="Staging environment"> Staging environment</label>
                <label class="tech-check"><input type="checkbox" value="GitHub handoff"> GitHub handoff</label>
            </div>

            <div class="divider"></div>
            <div class="dynamic-list" id="additionalList"></div>
            <button class="btn-add" onclick="addAdditional()">+ Add item</button>
        </div>
    </div>

    <!-- 07 — INVESTMENT -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">7</div>
            <div>
                <div class="section-label">Investment</div>
                            </div>
                    </div>
        <div class="section-body">
                        <div class="dynamic-list" id="investmentRows"></div>
            <button class="btn-add" onclick="addInvestmentRow()">+ Add line item</button>

            <div class="divider"></div>
            <div class="field-group cols-2">
                <div class="field">
                    <label>Total *</label>
                    <input type="text" id="investmentTotal" placeholder="$5,200">
                </div>
                <div class="field">
                    <label>Payment note</label>
                    <input type="text" id="paymentNote" placeholder="Prices in USD. GBP / EUR equivalent available on request." value="Prices in USD. GBP / EUR equivalent available on request.">
                </div>
            </div>

            <div class="divider"></div>
                        <div class="dynamic-list" id="optionalRows"></div>
            <button class="btn-add" onclick="addOptionalRow()">+ Add optional</button>

            <div class="divider"></div>
            <div class="field-group cols-2">
                <div class="field">
                    <label>Payment structure</label>
                    <select id="paymentStructure">
                        <option value="50-50">50% upfront · 50% on final delivery</option>
                        <option value="100">100% upfront</option>
                        <option value="33-33-33">33% upfront · 33% midpoint · 33% on delivery</option>
                        <option value="custom">Custom (specify in payment note)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Next step 2 (custom)</label>
                    <input type="text" id="nextStepTwo" placeholder="We send a short intake form — references, competitors, and technical requirements" value="We send a short intake form — references, competitors, and technical requirements">
                </div>
            </div>
        </div>
    </div>

</div><!-- /gen-body -->

<script>
// ── TOGGLE BUTTONS ──────────────────────────────────────────
const toggleState = { narrative: 'false', brandkit: 'false', platform: 'false' };
function setToggle(btn, callback) {
    const group = btn.dataset.group;
    btn.closest('.toggle-group').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    toggleState[group] = btn.dataset.value;
    if (callback) callback(btn.dataset.value === 'true');
}
function togglePlatform(show) {
    document.getElementById('platformEditor').style.display = show ? 'block' : 'none';
}

// ── PAGES ────────────────────────────────────────────────────
const PAGE_TYPES = ['homepage','portfolio','projects','product','about','services','contact','landing','blog','pillar','social','comms','case-study','custom'];
function addPage(name='', type='') {
    const list = document.getElementById('pagesList');
    const row = document.createElement('div');
    row.className = 'dynamic-row pages-row';
    row.innerHTML = `
        <input type="text" placeholder="Page name" value="${name}" class="page-name">
        <select class="page-type">${PAGE_TYPES.map(t=>`<option value="${t}"${t===type?' selected':''}>${t}</option>`).join('')}</select>
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── DIAGNOSIS ────────────────────────────────────────────────
function addDiagnosis(title='', body='') {
    const list = document.getElementById('diagnosisList');
    const row = document.createElement('div');
    row.className = 'dynamic-row diagnosis-row';
    row.innerHTML = `
        <input type="text" placeholder="Problem title" value="${title}" class="diag-title">
        <input type="text" placeholder="Explanation..." value="${body}" class="diag-body">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── ROADMAP ──────────────────────────────────────────────────
let phaseCount = 0;
function removeLastPhase() {
    const container = document.getElementById('roadmapPhases');
    if (container.lastElementChild) {
        container.removeChild(container.lastElementChild);
        phaseCount = Math.max(0, phaseCount - 1);
    }
}
function addPhase(title='', meta='', steps=[]) {
    const container = document.getElementById('roadmapPhases');
    const id = 'phase-' + phaseCount++;
    const div = document.createElement('div');
    div.className = 'roadmap-phase';
    div.dataset.phaseId = id;
    div.innerHTML = `
        <div class="roadmap-phase-header">
            <span class="roadmap-phase-title">Phase ${phaseCount}</span>
        </div>
        <div class="field-group cols-2" style="margin-bottom:12px">
            <div class="field"><label>Title</label><input type="text" placeholder="Phase 1 — Brand Identity" value="${title}" class="phase-title"></div>
            <div class="field"><label>Timeline</label><input type="text" placeholder="(Weeks 1–2 · 10–12 days)" value="${meta}" class="phase-meta"></div>
        </div>
                <div class="dynamic-list phase-steps-list"></div>
        <button class="btn-add" onclick="addStep(this)">+ Add step</button>`;
    container.appendChild(div);
    const stepsList = div.querySelector('.phase-steps-list');
    if (steps.length) steps.forEach(s => addStepToList(stepsList, s));
    else { addStepToList(stepsList); addStepToList(stepsList); }
}

function addStep(btn) { addStepToList(btn.previousElementSibling); }
function addStepToList(list, value='') {
    const row = document.createElement('div');
    row.className = 'dynamic-row roadmap-step-row';
    row.innerHTML = `
        <input type="text" placeholder="Step name" value="${value}" class="step-name">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── PLATFORM SPECS ───────────────────────────────────────────
function addSpec(containerId, key='', val='') {
    const container = document.getElementById('platform' + containerId.charAt(0).toUpperCase() + containerId.slice(1));
    const row = document.createElement('div');
    row.className = 'spec-row';
    row.innerHTML = `
        <input type="text" placeholder="Label (e.g. Cost)" value="${key}" class="spec-key">
        <input type="text" placeholder="Value (e.g. ~$500/mo)" value="${val}" class="spec-val">
        <button class="btn-remove" onclick="this.closest('.spec-row').remove()">×</button>`;
    container.appendChild(row);
}

// ── BRANDING DELIVERABLES ────────────────────────────────────
function addBranding(title='', description='') {
    const list = document.getElementById('brandingList');
    const row = document.createElement('div');
    row.className = 'dynamic-row branding-row';
    row.innerHTML = `
        <input type="text" placeholder="Item title" value="${title}" class="brand-title">
        <input type="text" placeholder="Description" value="${description}" class="brand-desc">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── ADDITIONAL DELIVERABLES ──────────────────────────────────
function addAdditional(value='') {
    const list = document.getElementById('additionalList');
    const row = document.createElement('div');
    row.className = 'dynamic-row additional-row';
    row.innerHTML = `
        <input type="text" placeholder="e.g. Framer CMS configured" value="${value}" class="additional-item">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── INVESTMENT ROWS ──────────────────────────────────────────
function addInvestmentRow(label='', amount='', border=false) {
    const list = document.getElementById('investmentRows');
    const row = document.createElement('div');
    row.className = 'dynamic-row investment-row';
    row.innerHTML = `
        <input type="text" placeholder="Line item description" value="${label}" class="inv-label">
        <input type="text" placeholder="$0,000" value="${amount}" class="inv-amount">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}
function addOptionalRow(label='', amount='') {
    const list = document.getElementById('optionalRows');
    const row = document.createElement('div');
    row.className = 'dynamic-row investment-row';
    row.innerHTML = `
        <input type="text" placeholder="+ Optional add-on" value="${label}" class="opt-label">
        <input type="text" placeholder="+$000" value="${amount}" class="opt-amount">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── DATA COLLECTION ──────────────────────────────────────────
function collectData() {
    const v = id => document.getElementById(id)?.value?.trim() || '';
    const clientName = v('clientName');
    const projectName = v('projectName');
    if (!clientName || !projectName) {
        alert('Client name and Project name are required.');
        return null;
    }

    const pages = [...document.querySelectorAll('#pagesList .pages-row')].map(r => ({
        name: r.querySelector('.page-name').value.trim(),
        type: r.querySelector('.page-type').value
    })).filter(p => p.name);

    const visionBody = v('visionBody');
    const visionParagraphs = visionBody.split(/\n\n+/).map(p => p.replace(/\[CLIENT_NAME\]/g, clientName).trim()).filter(Boolean);

    const diagnosisItems = [...document.querySelectorAll('#diagnosisList .diagnosis-row')].map(r => ({
        title: r.querySelector('.diag-title').value.trim(),
        body: r.querySelector('.diag-body').value.trim().replace(/\[CLIENT_NAME\]/g, clientName)
    })).filter(d => d.title);

    const roadmapPhases = [...document.querySelectorAll('#roadmapPhases .roadmap-phase')].map(phase => ({
        title: phase.querySelector('.phase-title').value.trim(),
        meta: phase.querySelector('.phase-meta').value.trim(),
        steps: [...phase.querySelectorAll('.step-name')].map(s => s.value.trim()).filter(Boolean)
    })).filter(p => p.title);

    const showPlatform = toggleState.platform === 'true';
    let platformComparison = null;
    if (showPlatform) {
        platformComparison = {
            show: true,
            current: {
                name: v('platformCurrentName'),
                specs: [...document.querySelectorAll('#platformCurrentSpecs .spec-row')].map(r => [r.querySelector('.spec-key').value.trim(), r.querySelector('.spec-val').value.trim()]).filter(([k]) => k)
            },
            proposed: {
                name: v('platformProposedName'),
                specs: [...document.querySelectorAll('#platformProposedSpecs .spec-row')].map(r => [r.querySelector('.spec-key').value.trim(), r.querySelector('.spec-val').value.trim()]).filter(([k]) => k)
            },
            note: v('platformNote')
        };
    }

    const brandingDeliverables = [...document.querySelectorAll('#brandingList .branding-row')].map(r => ({
        title: r.querySelector('.brand-title').value.trim(),
        description: r.querySelector('.brand-desc').value.trim()
    })).filter(b => b.title);

    const additionalDeliverables = [...document.querySelectorAll('#additionalList .additional-row')].map(r => r.querySelector('.additional-item').value.trim()).filter(Boolean);

    const investmentRows = [...document.querySelectorAll('#investmentRows .investment-row')].map(r => ({
        label: r.querySelector('.inv-label').value.trim(),
        amount: r.querySelector('.inv-amount').value.trim()
    })).filter(r => r.label);

    const investmentOptionals = [...document.querySelectorAll('#optionalRows .investment-row')].map(r => ({
        label: r.querySelector('.opt-label').value.trim(),
        amount: r.querySelector('.opt-amount').value.trim()
    })).filter(r => r.label);

    return {
        clientName, clientEmail: v('clientEmail'),
        projectName, proposalDate: v('proposalDate'),
        proposalType: v('proposalType') || 'Brand & Website Proposal',
        projectType: document.getElementById('projectType').value,
        tier: document.getElementById('projectTier').value,
        scenario: document.getElementById('projectScenario').value,
        hasNarrative: document.querySelector('input[name="narrative"]:checked').value === 'true',
        hasBrandkit: document.getElementById('projectScenario').value !== 'A',
        pages, visionParagraphs,
        visionNote: v('visionNote').replace(/\[CLIENT_NAME\]/g, clientName),
        diagnosisItems, roadmapPhases, platformComparison,
        brandingDeliverables, additionalDeliverables,
        leadName: v('leadName'),
        investmentRows, investmentTotal: (() => {
            const manual = v('investmentTotal');
            if (manual) return manual;
            const sum = investmentRows.reduce((acc, r) => {
                return acc + (parseFloat(r.amount.replace(/[^0-9.]/g, '')) || 0);
            }, 0);
            return sum > 0 ? '$' + sum.toLocaleString('en-US') : '';
        })(),
        investmentOptionals, paymentNote: v('paymentNote'),
        paymentStructure: document.getElementById('paymentStructure').value,
        techDeliverables: [...document.querySelectorAll('#techCheckboxes input[type="checkbox"]:checked')].map(cb => cb.value),
        nextStepTwo: v('nextStepTwo')
    };
}

// ── GENERATE ─────────────────────────────────────────────────
let generatedUrl = '';
async function generateProposal() {
    const data = collectData();
    if (!data) return;

    const btn = document.getElementById('btnGenerate');
    const status = document.getElementById('footerStatus');
    btn.disabled = true;
    btn.textContent = 'Generating...';
    status.textContent = 'Saving to server...';

    try {
        const res = await fetch('/api/generate-proposal', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Failed');

        generatedUrl = json.url;
        document.getElementById('resultUrl').textContent = generatedUrl;
        document.getElementById('resultBox').classList.add('show');
        document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
        status.textContent = `✓ Proposal created — ${json.id}`;
        btn.textContent = 'Generate New →';
        btn.disabled = false;
    } catch (err) {
        status.textContent = 'Error: ' + err.message;
        btn.textContent = 'Generate Proposal →';
        btn.disabled = false;
    }
}

function copyUrl() {
    navigator.clipboard.writeText(generatedUrl).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy link', 2000);
    });
}
function openUrl() { window.open(generatedUrl, '_blank'); }

addPage('Home', 'homepage');
addPage('About', 'about');
addPage('Contact', 'contact');

addDiagnosis('', '');
addDiagnosis('', '');
addDiagnosis('', '');

addPhase('Phase 1 — Brand Identity', '(Weeks 1–2 · 10–12 days)', ['Logo concepts', 'Review', 'Refinement', 'Final Handoff']);

addInvestmentRow('', '');

document.getElementById('proposalDate').value = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
</script>
