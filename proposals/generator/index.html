<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal Generator — Moood.Studio</title>
<link rel="stylesheet" href="/proposals/generator/style.css">
</head>
<body>

<header class="gen-header">
    <div class="gen-header-left">
        <div class="gen-logo">
            <img src="../../assets/images/moood-logo.svg" alt="Moood.Studio">
        </div>
    </div>
    <div class="gen-header-right">
        <div class="gen-header-status" id="footerStatus">Fill all required fields (*) then generate.</div>
        <button class="btn-generate" id="btnGenerate" onclick="generateProposal()">Generate Proposal →</button>
    </div>
</header>

<div class="gen-body">
    <div class="gen-title-row">
        <h1 class="gen-page-title">Proposal Generator</h1>
        <button class="magic-btn" onclick="toggleMagicIntake()">
            <svg viewBox="0 0 24 24"><path d="M12 2L14.85 8.15L21 11L14.85 13.85L12 20L9.15 13.85L3 11L9.15 8.15L12 2Z" /><path d="M6 3L7.15 5.85L10 7L7.15 8.15L6 11L4.85 8.15L2 7L4.85 5.85L6 3Z" /><path d="M18 13L19.15 15.85L22 17L19.15 18.15L18 21L16.85 18.15L14 17L16.85 15.85L18 13Z" /></svg>
            AI Magic Intake
        </button>
    </div>

    <div class="magic-intake-wrapper" id="magicIntake">
        <div class="magic-intake-header">
            <h4 class="magic-intake-title">Paste Meeting Transcript</h4>
            <button class="btn-remove" onclick="toggleMagicIntake()">×</button>
        </div>
        <textarea id="aiTranscript" rows="8" placeholder="Paste your meeting transcript here..."></textarea>
        <div class="magic-intake-footer">
            <button class="magic-btn" id="btnMagicExtract" onclick="extractTranscript()">
                <svg viewBox="0 0 24 24"><path d="M12 2L14.85 8.15L21 11L14.85 13.85L12 20L9.15 13.85L3 11L9.15 8.15L12 2Z" /><path d="M6 3L7.15 5.85L10 7L7.15 8.15L6 11L4.85 8.15L2 7L4.85 5.85L6 3Z" /><path d="M18 13L19.15 15.85L22 17L19.15 18.15L18 21L16.85 18.15L14 17L16.85 15.85L18 13Z" /></svg>
                Extract Data
            </button>
            <span id="magicStatus" class="magic-status"></span>
        </div>
    </div>

    <!-- RESULT BOX (shown after generation) -->
    <div class="result-box" id="resultBox">
        <div class="result-label">Proposal ready</div>
        <div class="result-url" id="resultUrl"></div>
        <div class="result-actions">
            <button class="btn-copy" onclick="copyUrl()">Copy link</button>
            <button class="btn-open" onclick="openUrl()">Open proposal</button>
        </div>
    </div>

    <!-- 01 — CLIENT -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">1</div>
            <div>
                <div class="section-label">Client</div>
                            </div>
                    </div>
        <div class="section-body">
            <div class="field-group cols-2">
                <div class="field">
                    <label>Client name *</label>
                    <input type="text" id="clientName" placeholder="Client company name" required>
                </div>
                <div class="field">
                    <label>Project name *</label>
                    <input type="text" id="projectName" placeholder="Client — Project description" required>
                </div>
            </div>
            <div class="field-group cols-2">
                <div class="field">
                    <label>Project lead name</label>
                    <input type="text" id="leadName" placeholder="Jane Smith">
                </div>
                <div class="field">
                    <label>Project lead email</label>
                    <input type="email" id="clientEmail" placeholder="hello@client.com">
                </div>
            </div>
            <div class="field-group cols-2">
                <div class="field">
                    <label>Proposal date</label>
                    <input type="text" id="proposalDate" placeholder="DD/MM/AA">
                </div>
            <div class="field">
                <label>Proposal type label</label>
                <input type="text" id="proposalType" placeholder="e.g. Website proposal">
                            </div>
        </div>
    </div>

    <!-- 02 — PROJECT CONFIG -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">2</div>
            <div>
                <div class="section-label">Project Config</div>
                            </div>
                    </div>
        <div class="section-body">
            <div class="field-group cols-3">
                <div class="field">
                    <label>Project type</label>
                    <select id="projectType" onchange="handleProjectTypeChange()">
                        <option value="single">Single page</option>
                        <option value="website">Website</option>
                        <option value="landing">Landing page</option>
                        <option value="blog">Blog</option>
                        <option value="pillar">Pillar page</option>
                        <option value="social">Social media</option>
                        <option value="comms">Communications</option>
                        <option value="branding">Branding</option>
                        <option value="figma">Figma fidelity</option>
                        <option value="migration">Migration</option>
                    </select>
                </div>
                <div class="field">
                    <label>Tier</label>
                    <select id="projectTier">
                        <option value="small">Small (3–5 pages)</option>
                        <option value="medium">Medium (6–8 pages)</option>
                        <option value="large" selected>Large (9+ pages)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Scenario</label>
                    <select id="projectScenario">
                        <option value="A">Brand-Free</option>
                        <option value="B">Brand-Locked</option>
                    </select>
                </div>
            </div>
            <div class="field-group cols-2">
                <div class="field">
                    <label>Narrative</label>
                    <div class="radio-group" style="display:flex;gap:24px;margin-top:10px;">
                        <label style="flex-direction:row;font-size:15px;color:#000;text-transform:none;letter-spacing:normal;font-weight:400;margin:0;"><input type="radio" name="narrative" value="false" style="width:auto;margin:0;"> Strategist writes</label>
                        <label style="flex-direction:row;font-size:15px;color:#000;text-transform:none;letter-spacing:normal;font-weight:400;margin:0;"><input type="radio" name="narrative" value="true" style="width:auto;margin:0;"> Client delivers copy</label>
                    </div>
                </div>
            </div>

            <div class="divider" id="pagesDivider"></div>
            <div class="dynamic-list" id="pagesList"></div>
            <button class="btn-add" id="btnAddPage" onclick="addPage()">+ Add page</button>
        </div>
    </div>

    <!-- 03 — THE VISION -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">3</div>
            <div>
                <div class="section-label">The Vision</div>
                            </div>
                    </div>
        <div class="section-body">
                        <div class="field">
                <label>Vision body *</label>
                <textarea id="visionBody" rows="6" placeholder="What's the core ambition of this project?"></textarea>
                            </div>
            <div class="field" style="margin-top:12px">
                <label>Footer note (optional)</label>
                <input type="text" id="visionNote" placeholder="Optional footnote — e.g. 'This is a two-phase project: Brand Identity first, Website second.'">
                            </div>
        </div>
    </div>

    <!-- 04 — THE DIAGNOSIS -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">4</div>
            <div>
                <div class="section-label">The Diagnosis</div>
                            </div>
                    </div>
        <div class="section-body">
            <div class="dynamic-list" id="diagnosisList"></div>
            <button class="btn-add" onclick="addDiagnosis()">+ Add problem</button>
        </div>
    </div>

    <!-- 05 — THE ROADMAP -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">5</div>
            <div>
                <div class="section-label">The Roadmap</div>
                            </div>
                    </div>
        <div class="section-body">
            <div id="roadmapPhases"></div>
            <div style="display:flex; gap:8px;">
                <button class="btn-add" onclick="addPhase()">+ Add phase</button>
                <button class="btn-add" style="color:#999; border-color:transparent;" onclick="removeLastPhase()">- Remove phase</button>
            </div>

            <div class="divider"></div>
                        <div class="field" style="margin-bottom:12px">
                <div class="toggle-group">
                    <button class="toggle-btn active" data-group="platform" data-value="false" onclick="setToggle(this,togglePlatform)">No comparison</button>
                    <button class="toggle-btn" data-group="platform" data-value="true" onclick="setToggle(this,togglePlatform)">Show comparison</button>
                </div>
            </div>
            <div id="platformEditor" style="display:none">
                <div class="platform-cards">
                    <div class="platform-card-editor">
                        <h4>Current stack</h4>
                        <div class="field" style="margin-bottom:10px"><label>Name</label><input type="text" id="platformCurrentName" placeholder="HubSpot Starter"></div>
                        <div id="platformCurrentSpecs"></div>
                        <button class="btn-add" onclick="addSpec('currentSpecs')">+ Add spec</button>
                    </div>
                    <div class="platform-card-editor">
                        <h4>Proposed</h4>
                        <div class="field" style="margin-bottom:10px"><label>Name</label><input type="text" id="platformProposedName" placeholder="Framer"></div>
                        <div id="platformProposedSpecs"></div>
                        <button class="btn-add" onclick="addSpec('proposedSpecs')">+ Add spec</button>
                    </div>
                </div>
                <div class="field" style="margin-top:12px">
                    <label>Comparison note</label>
                    <input type="text" id="platformNote" placeholder="HubSpot stays as your CRM. Framer replaces HubSpot as the website layer.">
                </div>
            </div>
        </div>
    </div>

    <!-- 06 — THE DELIVERABLES -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">6</div>
            <div>
                <div class="section-label">The Deliverables</div>
            </div>
        </div>
        <div class="section-body">
            <div class="dynamic-list" id="brandingList"></div>
            <button class="btn-add" onclick="addBranding()">+ Add branding item</button>

            <div class="divider"></div>
            <div class="subsection-label">Technical scope</div>
            <div class="field">
                <input type="text" id="techScope" placeholder="e.g. Framer development, HubSpot integration, SEO setup">
            </div>

            <div class="divider"></div>
            <div class="dynamic-list" id="additionalList"></div>
            <button class="btn-add" onclick="addAdditional()">+ Add item</button>
        </div>
    </div>

    <!-- 07 — INVESTMENT -->
    <div class="section">
        <div class="section-header">
            <div class="section-number">7</div>
            <div>
                <div class="section-label">Investment</div>
                            </div>
                    </div>
        <div class="section-body">
            <div class="field" style="max-width: 200px; margin-bottom: 24px;">
                <label>Currency</label>
                <select id="currencySelector" onchange="updateInvestmentTotal()">
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                </select>
            </div>

            <div class="dynamic-list" id="investmentRows"></div>
            <button class="btn-add" onclick="addInvestmentRow()">+ Add line item</button>

            <div class="divider"></div>
            <div class="field-group cols-2">
                <div class="field">
                    <label>Total *</label>
                    <input type="text" id="investmentTotal" placeholder="$0" readonly style="background:#eee; cursor:not-allowed">
                </div>
                <div class="field">
                    <label>Payment note</label>
                    <input type="text" id="paymentNote" placeholder="Prices in USD. GBP / EUR equivalent available on request." value="Prices in USD. GBP / EUR equivalent available on request.">
                </div>
            </div>

            <div class="divider"></div>
                        <div class="dynamic-list" id="optionalRows"></div>
            <button class="btn-add" onclick="addOptionalRow()">+ Add optional</button>

            <div class="divider"></div>
            <div class="field-group cols-2">
                <div class="field">
                    <label>Payment structure</label>
                    <select id="paymentStructure">
                        <option value="50% upfront, 50% on delivery/launch">50% upfront, 50% on delivery/launch</option>
                        <option value="100% upfront">100% upfront</option>
                        <option value="33% upfront, 33% midpoint, 33% on delivery">33% upfront, 33% midpoint, 33% on delivery</option>
                        <option value="custom">Custom (specify in payment note)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Next step 2 (custom)</label>
                    <input type="text" id="nextStepTwo" placeholder="We send a short intake form — references, competitors, and technical requirements" value="We send a short intake form — references, competitors, and technical requirements">
                </div>
            </div>
        </div>
    </div>

</div><!-- /gen-body -->

<script>
// ── TOGGLE BUTTONS ──────────────────────────────────────────
const toggleState = { narrative: 'false', brandkit: 'false', platform: 'false' };
function setToggle(btn, callback) {
    const group = btn.dataset.group;
    btn.closest('.toggle-group').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    toggleState[group] = btn.dataset.value;
    if (callback) callback(btn.dataset.value === 'true');
}
function togglePlatform(show) {
    document.getElementById('platformEditor').style.display = show ? 'block' : 'none';
}

function toggleMagicIntake() {
    document.getElementById('magicIntake').classList.toggle('active');
}

async function extractTranscript() {
    const transcript = document.getElementById('aiTranscript').value.trim();
    if (!transcript) return alert('Please paste a transcript first.');

    const btn = document.getElementById('btnMagicExtract');
    const status = document.getElementById('magicStatus');
    
    btn.disabled = true;
    btn.textContent = 'Analyzing...';
    status.textContent = 'AI is reading the transcript...';

    try {
        const res = await fetch('/api/magic', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ transcript })
        });
        
        if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.message || errData.error || 'AI Magic Intake endpoint not yet active.');
        }
        const data = await res.json();

        // 1. Populate Basic Info
        if (data.clientName) document.getElementById('clientName').value = data.clientName;
        if (data.projectName) document.getElementById('projectName').value = data.projectName;
        if (data.projectType) document.getElementById('projectType').value = data.projectType;
        if (data.projectTier) document.getElementById('projectTier').value = data.projectTier;
        if (data.projectScenario) document.getElementById('projectScenario').value = data.projectScenario;
        
        if (data.vision) document.getElementById('visionBody').value = data.vision;
        
        // 2. Pages
        const pagesList = document.getElementById('pagesList');
        pagesList.innerHTML = '';
        if (data.pages && data.pages.length) {
            data.pages.forEach(p => addPage(p.name, p.type));
        } else {
            addPage('Home', 'homepage');
        }
        
        // 3. Diagnosis
        const diagList = document.getElementById('diagnosisList');
        diagList.innerHTML = '';
        if (data.diagnosis) {
            data.diagnosis.forEach(d => addDiagnosis(d.title, d.body));
        }
        
        // 4. Roadmap
        const roadmapPhases = document.getElementById('roadmapPhases');
        roadmapPhases.innerHTML = '';
        phaseCount = 0;
        if (data.roadmap) {
            data.roadmap.forEach(p => addPhase(p.title, p.meta, p.steps));
        }
        
        // 5. Investment
        const invRows = document.getElementById('investmentRows');
        invRows.innerHTML = '';
        if (data.investment && data.investment.length) {
            data.investment.forEach(r => addInvestmentRow(r.label, r.amount));
        } else {
            addInvestmentRow('', '');
        }

        // 6. Refresh UI logic
        handleProjectTypeChange();
        updateInvestmentTotal();
        
        status.textContent = '✨ Done! Fields populated.';
        setTimeout(() => {
            status.textContent = '';
            toggleMagicIntake();
        }, 2000);

    } catch (err) {
        console.error(err);
        status.textContent = '❌ Error: ' + err.message;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Extract Data ✨';
    }
}

// ── PAGES ────────────────────────────────────────────────────

function getPageTypes(pt) {
    if (pt === 'blog') return ['blog-index','blog-post','blog-category','blog-author','search-results','custom'];
    if (pt === 'social') return ['social','custom'];
    if (pt === 'comms') return ['comms','custom'];
    if (pt === 'pillar') return ['pillar','custom'];
    
    // Default set (excludes social and comms for standard web projects)
    return ['homepage','portfolio','projects','product','about','services','contact','landing','blog','pillar','case-study','custom'];
}

function addPage(name='', type='') {
    const list = document.getElementById('pagesList');
    const pt = document.getElementById('projectType').value;
    const types = getPageTypes(pt);
    
    const row = document.createElement('div');
    row.className = 'dynamic-row pages-row';
    row.innerHTML = `
        <input type="text" placeholder="Page name" value="${name}" class="page-name">
        <select class="page-type">${types.map(t=>`<option value="${t}"${t===type?' selected':''}>${t}</option>`).join('')}</select>
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── DIAGNOSIS ────────────────────────────────────────────────
function addDiagnosis(title='', body='') {
    const list = document.getElementById('diagnosisList');
    const row = document.createElement('div');
    row.className = 'dynamic-row diagnosis-row';
    row.innerHTML = `
        <input type="text" placeholder="Problem title" value="${title}" class="diag-title">
        <input type="text" placeholder="Explanation..." value="${body}" class="diag-body">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── ROADMAP ──────────────────────────────────────────────────
let phaseCount = 0;
function removeLastPhase() {
    const container = document.getElementById('roadmapPhases');
    if (container.lastElementChild) {
        container.removeChild(container.lastElementChild);
        phaseCount = Math.max(0, phaseCount - 1);
    }
}
function addPhase(title='', meta='', steps=[]) {
    const container = document.getElementById('roadmapPhases');
    const id = 'phase-' + phaseCount++;
    const div = document.createElement('div');
    div.className = 'roadmap-phase';
    div.dataset.phaseId = id;
    div.innerHTML = `
        <div class="roadmap-phase-header">
            <span class="roadmap-phase-title">Phase ${phaseCount}</span>
        </div>
        <div class="field-group cols-2" style="margin-bottom:12px">
            <div class="field"><label>Title</label><input type="text" placeholder="Phase 1 — Brand Identity" value="${title}" class="phase-title"></div>
            <div class="field"><label>Timeline</label><input type="text" placeholder="(Weeks 1–2 · 10–12 days)" value="${meta}" class="phase-meta"></div>
        </div>
                <div class="dynamic-list phase-steps-list"></div>
        <button class="btn-add" onclick="addStep(this)">+ Add step</button>`;
    container.appendChild(div);
    const stepsList = div.querySelector('.phase-steps-list');
    if (steps.length) steps.forEach(s => addStepToList(stepsList, s));
}

function addStep(btn) { addStepToList(btn.previousElementSibling); }
function addStepToList(list, value='') {
    const row = document.createElement('div');
    row.className = 'dynamic-row roadmap-step-row';
    row.innerHTML = `
        <input type="text" placeholder="Step name" value="${value}" class="step-name">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── PLATFORM SPECS ───────────────────────────────────────────
function addSpec(containerId, key='', val='') {
    const container = document.getElementById('platform' + containerId.charAt(0).toUpperCase() + containerId.slice(1));
    const row = document.createElement('div');
    row.className = 'spec-row';
    row.innerHTML = `
        <input type="text" placeholder="Label (e.g. Cost)" value="${key}" class="spec-key">
        <input type="text" placeholder="Value (e.g. ~$500/mo)" value="${val}" class="spec-val">
        <button class="btn-remove" onclick="this.closest('.spec-row').remove()">×</button>`;
    container.appendChild(row);
}

// ── BRANDING DELIVERABLES ────────────────────────────────────
function addBranding(title='', description='') {
    const list = document.getElementById('brandingList');
    const row = document.createElement('div');
    row.className = 'dynamic-row branding-row';
    row.innerHTML = `
        <input type="text" placeholder="Item title" value="${title}" class="brand-title">
        <input type="text" placeholder="Description" value="${description}" class="brand-desc">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── ADDITIONAL DELIVERABLES ──────────────────────────────────
function addAdditional(value='') {
    const list = document.getElementById('additionalList');
    const row = document.createElement('div');
    row.className = 'dynamic-row additional-row';
    row.innerHTML = `
        <input type="text" placeholder="e.g. Framer CMS configured" value="${value}" class="additional-item">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove()">×</button>`;
    list.appendChild(row);
}

// ── INVESTMENT ROWS ──────────────────────────────────────────
function updateInvestmentTotal() {
    const currency = document.getElementById('currencySelector').value;
    const symbol = currency === 'EUR' ? '€' : '$';
    
    // Update placeholders for all existing rows
    document.querySelectorAll('.inv-amount').forEach(el => el.placeholder = symbol + "0,000");
    document.querySelectorAll('.opt-amount').forEach(el => el.placeholder = "+" + symbol + "000");
    
    // Calculate regular investment sum
    const invRows = document.querySelectorAll('#investmentRows .inv-amount');
    let total = 0;
    invRows.forEach(row => {
        const val = row.value.replace(/[^0-9.]/g, '');
        total += parseFloat(val) || 0;
    });

    const formatted = symbol + total.toLocaleString('en-US');
    document.getElementById('investmentTotal').value = total > 0 ? formatted : '';
    document.getElementById('investmentTotal').placeholder = symbol + "0";

    // Update payment note based on currency
    const paymentNote = document.getElementById('paymentNote');
    if (currency === 'EUR') {
        paymentNote.placeholder = "Prices in EUR. USD / GBP equivalent available on request.";
        if (!paymentNote.value || paymentNote.value.includes("USD")) {
            paymentNote.value = "Prices in EUR. USD / GBP equivalent available on request.";
        }
    } else {
        paymentNote.placeholder = "Prices in USD. GBP / EUR equivalent available on request.";
        if (!paymentNote.value || paymentNote.value.includes("EUR")) {
            paymentNote.value = "Prices in USD. GBP / EUR equivalent available on request.";
        }
    }
}

function addInvestmentRow(label='', amount='', border=false) {
    const list = document.getElementById('investmentRows');
    const row = document.createElement('div');
    row.className = 'dynamic-row investment-row';
    const currency = document.getElementById('currencySelector').value;
    const symbol = currency === 'EUR' ? '€' : '$';
    row.innerHTML = `
        <input type="text" placeholder="Line item description" value="${label}" class="inv-label">
        <input type="text" placeholder="${symbol}0,000" value="${amount}" class="inv-amount" oninput="updateInvestmentTotal()">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove(); updateInvestmentTotal();">×</button>`;
    list.appendChild(row);
    if (amount) updateInvestmentTotal();
}
function addOptionalRow(label='', amount='') {
    const list = document.getElementById('optionalRows');
    const row = document.createElement('div');
    row.className = 'dynamic-row investment-row';
    const currency = document.getElementById('currencySelector').value;
    const symbol = currency === 'EUR' ? '€' : '$';
    row.innerHTML = `
        <input type="text" placeholder="+ Optional add-on" value="${label}" class="opt-label">
        <input type="text" placeholder="+${symbol}000" value="${amount}" class="opt-amount" oninput="updateInvestmentTotal()">
        <button class="btn-remove" onclick="this.closest('.dynamic-row').remove(); updateInvestmentTotal();">×</button>`;
    list.appendChild(row);
}

// ── DATA COLLECTION ──────────────────────────────────────────
function collectData() {
    const v = id => document.getElementById(id)?.value?.trim() || '';
    const clientName = v('clientName');
    const projectName = v('projectName');
    if (!clientName || !projectName) {
        alert('Client name and Project name are required.');
        return null;
    }
    if (!document.querySelector('input[name="narrative"]:checked')) {
        alert('Please select who delivers the copy: Strategist writes or Client delivers copy.');
        return null;
    }

    const pages = [...document.querySelectorAll('#pagesList .pages-row')].map(r => ({
        name: r.querySelector('.page-name').value.trim(),
        type: r.querySelector('.page-type').value
    })).filter(p => p.name);

    const visionBody = v('visionBody');
    const visionParagraphs = visionBody.split(/\n\n+/).map(p => p.replace(/\[CLIENT_NAME\]/g, clientName).trim()).filter(Boolean);

    const diagnosisItems = [...document.querySelectorAll('#diagnosisList .diagnosis-row')].map(r => ({
        title: r.querySelector('.diag-title').value.trim(),
        body: r.querySelector('.diag-body').value.trim().replace(/\[CLIENT_NAME\]/g, clientName)
    })).filter(d => d.title);

    const roadmapPhases = [...document.querySelectorAll('#roadmapPhases .roadmap-phase')].map(phase => ({
        title: phase.querySelector('.phase-title').value.trim(),
        meta: phase.querySelector('.phase-meta').value.trim(),
        steps: [...phase.querySelectorAll('.step-name')].map(s => s.value.trim()).filter(Boolean)
    })).filter(p => p.title);

    const showPlatform = toggleState.platform === 'true';
    let platformComparison = null;
    if (showPlatform) {
        platformComparison = {
            show: true,
            current: {
                name: v('platformCurrentName'),
                specs: [...document.querySelectorAll('#platformCurrentSpecs .spec-row')].map(r => [r.querySelector('.spec-key').value.trim(), r.querySelector('.spec-val').value.trim()]).filter(([k]) => k)
            },
            proposed: {
                name: v('platformProposedName'),
                specs: [...document.querySelectorAll('#platformProposedSpecs .spec-row')].map(r => [r.querySelector('.spec-key').value.trim(), r.querySelector('.spec-val').value.trim()]).filter(([k]) => k)
            },
            note: v('platformNote')
        };
    }

    const brandingDeliverables = [...document.querySelectorAll('#brandingList .branding-row')].map(r => ({
        title: r.querySelector('.brand-title').value.trim(),
        description: r.querySelector('.brand-desc').value.trim()
    })).filter(b => b.title);

    const additionalDeliverables = [...document.querySelectorAll('#additionalList .additional-row')].map(r => r.querySelector('.additional-item').value.trim()).filter(Boolean);

    const investmentRows = [...document.querySelectorAll('#investmentRows .investment-row')].map(r => ({
        label: r.querySelector('.inv-label').value.trim(),
        amount: r.querySelector('.inv-amount').value.trim()
    })).filter(r => r.label);

    const investmentOptionals = [...document.querySelectorAll('#optionalRows .investment-row')].map(r => ({
        label: r.querySelector('.opt-label').value.trim(),
        amount: r.querySelector('.opt-amount').value.trim()
    })).filter(r => r.label);

    return {
        clientName, clientEmail: v('clientEmail'),
        projectName, proposalDate: v('proposalDate'),
        proposalType: v('proposalType') || 'Brand & Website Proposal',
        projectType: document.getElementById('projectType').value,
        tier: document.getElementById('projectTier').value,
        scenario: document.getElementById('projectScenario').value,
        hasNarrative: document.querySelector('input[name="narrative"]:checked').value === 'true',
        hasBrandkit: document.getElementById('projectScenario').value !== 'A',
        pages, visionParagraphs,
        visionNote: v('visionNote').replace(/\[CLIENT_NAME\]/g, clientName),
        diagnosisItems, roadmapPhases, platformComparison,
        brandingDeliverables, additionalDeliverables,
        leadName: v('leadName'),
        investmentRows, investmentTotal: (() => {
            const manual = v('investmentTotal');
            if (manual) return manual;
            const sum = investmentRows.reduce((acc, r) => {
                return acc + (parseFloat(r.amount.replace(/[^0-9.]/g, '')) || 0);
            }, 0);
            const currency = document.getElementById('currencySelector').value;
            const symbol = currency === 'EUR' ? '€' : '$';
            return sum > 0 ? symbol + sum.toLocaleString('en-US') : '';
        })(),
        investmentOptionals, paymentNote: v('paymentNote'),
        paymentStructure: document.getElementById('paymentStructure').value,
        techDeliverables: v('techScope').split(',').map(s => s.trim()).filter(Boolean),
        nextStepTwo: v('nextStepTwo')
    };
}

// ── GENERATE ─────────────────────────────────────────────────
let generatedUrl = '';
async function generateProposal() {
    const data = collectData();
    if (!data) return;

    const btn = document.getElementById('btnGenerate');
    const status = document.getElementById('footerStatus');
    btn.disabled = true;
    btn.textContent = 'Generating...';
    status.textContent = 'Saving to server...';

    try {
        const res = await fetch('/api/generate-proposal', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Failed');

        generatedUrl = json.adminUrl || json.url;
        document.getElementById('resultUrl').textContent = generatedUrl;
        document.getElementById('resultBox').classList.add('show');
        document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
        status.textContent = `✓ Draft created — ${json.id} (Review required)`;
        btn.textContent = 'Generate New →';
        btn.disabled = false;
    } catch (err) {
        status.textContent = 'Error: ' + err.message;
        btn.textContent = 'Generate Proposal →';
        btn.disabled = false;
    }
}

function copyUrl() {
    navigator.clipboard.writeText(generatedUrl).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy link', 2000);
    });
}
function openUrl() { window.open(generatedUrl, '_blank'); }

// ── INIT DEFAULTS ────────────────────────────────────────────
addPage('Home', 'homepage');
addDiagnosis('', '');
addPhase();
addInvestmentRow('', '');


function handleProjectTypeChange() {
    const pt = document.getElementById('projectType').value;
    const tier = document.getElementById('projectTier');
    const pagesList = document.getElementById('pagesList');
    const btnAddPage = document.getElementById('btnAddPage');
    const pagesDivider = document.getElementById('pagesDivider');
    
    tier.disabled = false;

    // Show/Hide Add Page button and divider
    const showAddPage = ['website', 'blog', 'migration'].includes(pt);
    btnAddPage.style.display = showAddPage ? 'inline-flex' : 'none';
    pagesDivider.style.display = showAddPage ? 'block' : 'none';
    
    if (pt === 'landing' || pt === 'single' || pt === 'pillar') {
        tier.innerHTML = '<option value="single" selected>Single page</option>';
        tier.disabled = true;
    } else if (pt === 'blog') {
        tier.innerHTML = '<option value="small" selected>Small (3–5 pages)</option>';
        tier.disabled = true;
    } else if (pt === 'social') {
        tier.innerHTML = `
            <option value="instagram">Instagram post</option>
            <option value="twitter">Twitter post</option>
            <option value="linkedin">LinkedIn Carousel</option>
            <option value="social-pack">Social Media Pack</option>
        `;
    } else if (pt === 'branding') {
        tier.innerHTML = `
            <option value="logo">Logo only</option>
            <option value="brandkit">Brand kit</option>
            <option value="full-guide">Full style guide</option>
        `;
    } else if (pt === 'figma') {
        tier.innerHTML = `
            <option value="single">Single page</option>
            <option value="multi">Multi-page</option>
        `;
    } else if (pt === 'website' || pt === 'migration' || pt === 'comms') {
        tier.innerHTML = `
            <option value="small" selected>Small (3–5 pages)</option>
            <option value="medium">Medium (6–8 pages)</option>
            <option value="large">Large (9+ pages)</option>
        `;
    }

    // Update page type options for all existing rows
    const types = getPageTypes(pt);
    document.querySelectorAll('.page-type').forEach(select => {
        const currentVal = select.value;
        select.innerHTML = types.map(t => `<option value="${t}"${t === currentVal ? ' selected' : ''}>${t}</option>`).join('');
    });

    // Logic for limiting pages for single-page types
    if (['landing', 'single', 'pillar', 'branding', 'social', 'figma'].includes(pt)) {
        while (pagesList.children.length > 1) {
            pagesList.removeChild(pagesList.lastChild);
        }
        if (pagesList.children.length === 0) {
            let defaultName = 'Home';
            if (pt === 'landing') defaultName = 'Landing Page';
            if (pt === 'pillar') defaultName = 'Pillar Page';
            if (pt === 'branding') defaultName = 'Brand Identity';
            if (pt === 'social') defaultName = 'Social Asset';
            addPage(defaultName, pt === 'landing' ? 'landing' : (pt === 'pillar' ? 'pillar' : 'homepage'));
        }
    } else if (pt === 'blog' && pagesList.children.length === 0) {
        addPage('Blog Home', 'blog-index');
        addPage('Example Post', 'blog-post');
    }
}

// ── INITIALIZATION ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    // Set current date
    const now = new Date();
    const dateInput = document.getElementById('proposalDate');
    if (dateInput && !dateInput.value) {
        const d = now.getDate().toString().padStart(2, '0');
        const m = (now.getMonth() + 1).toString().padStart(2, '0');
        const y = now.getFullYear().toString().slice(-2);
        dateInput.value = `${d}/${m}/${y}`;
    }
    
    // Initial call to set up UI
    handleProjectTypeChange();
});
</script>
