<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Email Preview — Moood.Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SIDEBAR ── */
    aside {
      width: 260px;
      flex-shrink: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 32px 24px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-logo {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 300;
      color: #fff;
      line-height: 1.2;
    }

    .sidebar-count {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-top: 6px;
    }

    .group-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      padding: 20px 24px 8px;
    }

    .email-item {
      padding: 10px 24px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }

    .email-item:hover { background: rgba(255,255,255,0.05); }

    .email-item.active {
      background: rgba(255,255,255,0.08);
      border-left-color: #fff;
    }

    .email-item-name {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      line-height: 1.3;
    }

    .email-item.active .email-item-name { color: #fff; }

    .email-item-to {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 2px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .badge-agency { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .badge-client { background: rgba(0,209,102,0.15); color: #00D166; }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .toolbar-subject {
      flex: 1;
      font-size: 12px;
      color: rgba(0,0,0,0.4);
    }

    .toolbar-subject strong {
      color: #000;
      font-weight: 600;
    }

    .btn-copy {
      padding: 7px 16px;
      background: #000;
      color: #fff;
      border: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .btn-copy:hover { opacity: 0.75; }
    .btn-copy.copied { background: #00D166; }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
    }
  </style>
</head>
<body>

<aside>
  <div class="sidebar-header">
    <p class="sidebar-logo">Moood.Studio</p>
    <h1 class="sidebar-title">Email<br>Preview</h1>
    <p class="sidebar-count" id="emailCount"></p>
  </div>
  <nav id="emailNav"></nav>
</aside>

<main>
  <div class="toolbar">
    <div class="toolbar-subject">
      <strong id="subjectDisplay">—</strong>
      <span id="toDisplay"></span>
    </div>
    <button class="btn-copy" id="btnCopy" onclick="copyHTML()">Copy HTML</button>
  </div>
  <iframe id="previewFrame" title="Email preview"></iframe>

.9997 629.254 94.5998 622.654 108.6 622.654Z" fill="white"/><path d="M644.935 728.254H624.734V708.254H644.935V728.254Z" fill="white"/><path d="M643.334 625.054L639.734 691.054H629.334L626.534 625.054V585.854H643.334V625.054Z" fill="white"/><path fill-rule="evenodd" clip-rule="evenodd" d="M554.749 11.9447C581.383 -13.9048 626 4.96764 626 42.0833V389.317C626 458.246 543.141 493.296 493.677 445.289L436.814 390.102L394.679 479.823C366.88 539.014 282.961 539.777 254.09 481.102L208.949 389.361L151.323 445.289C101.859 493.296 19 458.246 19 389.317V42.0833C19.0003 4.96764 63.6166 -13.9048 90.251 11.9447L322.5 237.35L554.749 11.9447ZM231.578 367.399L281.008 467.857C298.774 503.965 350.418 503.496 367.524 467.071L414.047 368.006L322.5 279.157L231.578 367.399ZM49 389.317C49 431.735 99.9904 453.304 130.43 423.762L195.027 361.067L49 64.2864V389.317ZM450.301 361.386L514.57 423.762C545.01 453.304 596 431.735 596 389.317V51.1478L450.301 361.386ZM344.038 258.253L427.533 339.289L567.4 41.47L344.038 258.253ZM217.656 339.104L300.961 258.253L69.3574 33.472C68.3677 32.5115 67.2902 31.7688 66.166 31.2239L217.656 339.104Z" fill="white"/></svg>`;

function buildEmail({ projectName, context, greeting, headline, body, highlight, cta, linkFallback, signature = true, footer }) {
  const headerRight = (projectName || context) ? `
    <td align="right" valign="middle">
      ${projectName ? `<p style="margin:0 0 4px;font-size:16px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#fff;">${projectName}</p>` : ''}
      ${context ? `<p style="margin:0;font-size:14px;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.4);">${context}</p>` : ''}
    </td>` : '';

  const greetingHtml = greeting
    ? `<p style="margin:0 0 20px;font-size:14px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.3);">${greeting}</p>`
    : '';

  const headlineHtml = headline
    ? `<h1 style="margin:0 0 24px;font-size:40px;font-weight:400;color:#000;line-height:1.15;letter-spacing:-0.01em;">${headline.replace(/<br\s*\/?>/gi, ' ')}</h1>`
    : '';

  const paragraphs = Array.isArray(body) ? body : (body ? [body] : []);
  const bodyHtml = paragraphs.map(p =>
    `<p style="margin:0 0 16px;font-size:18px;line-height:1.65;color:rgba(0,0,0,0.55);">${p}</p>`
  ).join('');

  const highlightHtml = highlight
    ? `<div style="background:#f5f5f5;padding:28px 32px;margin:28px 0 0;">${highlight}</div>`
    : '';

  const ctaHtml = cta ? `
    <table cellpadding="0" cellspacing="0" style="margin:36px 0 0;">
      <tr>
        <td style="background:#000;">
          <a href="${cta.href}" style="display:inline-block;padding:14px 28px;font-size:14px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#fff;text-decoration:none;">${cta.label}</a>
        </td>
      </tr>
    </table>` : '';

  const linkFallbackHtml = linkFallback ? `
    <p style="margin:20px 0 0;font-size:14px;color:rgba(0,0,0,0.3);line-height:1.7;">
      Or copy this link:<br>
      <span style="color:rgba(0,0,0,0.5);word-break:break-all;">${linkFallback}</span>
    </p>` : '';

  const signatureHtml = signature ? `
    <p style="margin:44px 0 0;font-size:14px;line-height:1.9;color:rgba(0,0,0,0.5);">
      Talk soon,<br>
      <strong style="color:#000;font-weight:600;">Alberto</strong><br>
      <span style="color:rgba(0,0,0,0.3);">Moood.Studio</span>
    </p>` : '';

  const footerHtml = footer ? `
    <tr>
      <td style="padding:20px 48px 0;border-top:1px solid rgba(0,0,0,0.06);">
        <p style="margin:0;font-size:14px;color:rgba(0,0,0,0.3);line-height:1.7;">${footer}</p>
      </td>
    </tr>` : '';

  const brandFooterHtml = `
    <tr>
      <td style="padding:28px 48px 36px;border-top:1px solid rgba(0,0,0,0.06);">
        <p style="margin:0 0 4px;font-size:14px;font-weight:700;color:#000;">
          <a href="https://moood.studio" style="color:#000;text-decoration:none;">Moood.Studio</a>
        </p>
        <p style="margin:0 0 20px;font-size:14px;color:rgba(0,0,0,0.35);">Strategic Design &amp; Brand Architecture</p>
        <p style="margin:0;font-size:14px;color:rgba(0,0,0,0.25);line-height:1.7;">Confidentiality Notice: This message is private and confidential. If you are not the intended recipient, please notify the sender and delete this message.</p>
      </td>
    </tr>`;

  return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#f0f0f0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:48px 24px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#fff;">
          <tr>
            <td style="background:#000;padding:24px 48px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td valign="middle">${LOGO_SVG}</td>${headerRight}
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:48px 48px 40px;">
              ${greetingHtml}
              ${headlineHtml}
              ${bodyHtml}
              ${highlightHtml}
              ${ctaHtml}
              ${linkFallbackHtml}
              ${signatureHtml}
            </td>
          </tr>
          ${footerHtml}
          ${brandFooterHtml}
        </table>
      </td>
    </tr>
  </table>
</body>
</html>`;
}

function dataTable(rows) {
  return `<table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;font-size:14px;">
    ${rows.map(([label, value]) => `
    <tr style="border-bottom:1px solid rgba(0,0,0,0.06);">
      <td style="padding:8px 0;color:rgba(0,0,0,0.35);width:140px;vertical-align:top;">${label}</td>
      <td style="padding:8px 0;color:#000;font-weight:500;">${value}</td>
    </tr>`).join('')}
  </table>`;
}

function codeBlock(code) {
  const digits = String(code).slice(-4).split('');
  const boxes = digits.map(d =>
    `<td style="padding:0 6px;"><div style="display:inline-block;width:60px;height:68px;line-height:68px;background:#fff;border:1.5px solid rgba(0,0,0,0.15);border-radius:8px;font-size:40px;font-weight:400;color:#000;text-align:center;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">${d}</div></td>`
  ).join('');
  return `<p style="margin:0 0 16px;font-size:14px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.3);">Your 4-digit access code</p>
  <table cellpadding="0" cellspacing="0"><tr>${boxes}</tr></table>
  <p style="margin:16px 0 0;font-size:14px;color:rgba(0,0,0,0.3);letter-spacing:0.05em;">Full reference: ${code}</p>`;
}

/* ══════════════════════════════════════════════════════
   UI
   ══════════════════════════════════════════════════════ */
let activeIndex = 0;

function renderNav() {
  const nav = document.getElementById('emailNav');
  const groups = [...new Set(emails.map(e => e.group))];

  nav.innerHTML = groups.map(group => {
    const items = emails.filter(e => e.group === group);
    return `
      <p class="group-label">${group}</p>
      ${items.map(e => {
        const i = emails.indexOf(e);
        return `<div class="email-item${i === activeIndex ? ' active' : ''}" onclick="selectEmail(${i})">
          <div class="email-item-name">
            ${e.name}
            <span class="badge badge-${e.to}">${e.to}</span>
          </div>
        </div>`;
      }).join('')}`;
  }).join('');

  document.getElementById('emailCount').textContent = `${emails.length} variants`;
}

function selectEmail(i) {
  activeIndex = i;
  const email = emails[i];
  const html = email.html();

  const frame = document.getElementById('previewFrame');
  frame.srcdoc = html;

  document.getElementById('subjectDisplay').textContent = email.subject;
  document.getElementById('toDisplay').innerHTML = ` &nbsp;·&nbsp; ${email.to === 'client' ? '→ client' : '→ agency'}`;

  renderNav();
}

function copyHTML() {
  const html = emails[activeIndex].html();
  navigator.clipboard.writeText(html).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy HTML'; btn.classList.remove('copied'); }, 2000);
  });
}

renderNav();
selectEmail(0);
